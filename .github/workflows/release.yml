name: Release

on:
  # Tag-driven releases: push v0.1.0, v0.2.0-rc1, etc.
  push:
    tags: [ "v*" ]
  # Allow ad-hoc release builds from the Actions tab too.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (eg v0.2.0)"
        required: true

jobs:
  macos-release:
    name: macOS (Apple Silicon) -- release artefact
    # macos-26 SDK has MTLFXTemporalDenoisedScaler; releases include the
    # full MetalFX denoiser path, not the SDK-stubbed fallback.
    runs-on: macos-26
    permissions:
      contents: write   # needed to attach artefacts to a Release
    steps:
      # Check out the release tag explicitly so re-running this workflow
      # via workflow_dispatch (with `tag` input) builds at the tagged
      # commit rather than the default branch HEAD. For tag-push
      # triggers, github.ref already points at the tag so this is a no-op.
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        # vulkan-headers + vulkan-loader give CMake's FindVulkan a
        # discoverable Vulkan::Vulkan target so the Vk backend builds.
        # molten-vk supplies the runtime ICD for full release coverage.
        run: brew install ninja cmake vulkan-headers vulkan-loader molten-vk || true

      - name: Configure (release)
        run: cmake --preset mac-release

      - name: Build
        run: cmake --build build/mac-release --parallel

      - name: Stage artefact tree
        # Stage just what an end-user actually needs to run the engine
        # -- the binary plus the data files it loads (HDRI, BSC star
        # catalog, etc). Skip object files, archives, third-party
        # source. Tag-named so the release page sees a meaningful
        # download name.
        run: |
          STAGE="demont-${{ steps.tag.outputs.value }}-macos-arm64"
          mkdir -p "dist/$STAGE"
          cp build/mac-release/src/app/demont "dist/$STAGE/"
          cp -R assets                        "dist/$STAGE/"
          cp LICENSE README.md                "dist/$STAGE/"
          cd dist
          # tar.gz preserves the executable bit; zip on macOS strips it.
          tar -czf "$STAGE.tar.gz" "$STAGE"
          ls -lh "$STAGE.tar.gz"
          echo "ARCHIVE=dist/$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artefact (always)
        uses: actions/upload-artifact@v4
        with:
          name: demont-macos-arm64
          path: ${{ env.ARCHIVE }}

      - name: Attach to GitHub Release
        # Fires for both tag-push triggers and workflow_dispatch with a
        # tag input.  tag_name is resolved explicitly so the action
        # targets the right release even when github.ref is a branch
        # ref (workflow_dispatch case).  generate_release_notes only
        # populates the body if the release doesn't already exist;
        # editing an existing release via `gh release edit` after the
        # initial creation is the right way to curate notes.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  windows-release:
    name: Windows (x64, clang-cl) -- release artefact
    # Mirrors the build.yml Windows job (compile-test) but in Release
    # config + staging an artefact tarball, parallel with the macOS
    # release job.  windows-latest gets cmake, MSVC via the action
    # below (we keep that step for the SDK headers + linker), and the
    # Vulkan SDK pinned to a known-good LunarG release.
    #
    # Release builds use the win-clang-release preset (clang-cl on top
    # of the MSVC toolchain) rather than plain MSVC. Embree compiles 4
    # ISA variants (SSE2 / SSE4.2 / AVX / AVX2) of every kernel for
    # runtime CPU dispatch -- ~250k LOC of templated C++ that MSVC
    # ground through in ~20min on the first cold build of v0.3.15.
    # clang-cl typically halves that on template-heavy code, and it
    # uses the same MSVC ABI / SDK headers so the resulting demont.exe
    # is binary-compatible with what users expect on Windows.
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ('${{ inputs.tag }}') {
            "value=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            $tag = '${{ github.ref }}' -replace '^refs/tags/', ''
            "value=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Set up MSVC
        # Configures the MSVC toolchain (SDK headers + link.exe + lib
        # paths) on the environment.  Required on windows-latest -- the
        # MSVC toolchain isn't on PATH by default.  We don't actually
        # compile with cl.exe here (the preset selects clang-cl) but
        # clang-cl piggy-backs on MSVC's headers + linker so this step
        # is still required.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Install Vulkan SDK
        # Same pin as build.yml -- 1.3.296.0 is widely cached + has
        # SPIR-V 1.6 + every extension the engine uses.
        uses: jakoch/install-vulkan-sdk-action@v1.2.0
        with:
          vulkan_version: 1.3.296.0
          install_runtime: true
          cache: true
          stripdown: true

      - name: Verify clang-cl is on PATH
        # windows-latest ships LLVM at C:\Program Files\LLVM\bin so
        # clang-cl.exe should already resolve.  Failing the job early
        # with a clear error beats a confusing CMake "compiler not
        # found" later in Configure if Microsoft ever changes that.
        shell: pwsh
        run: |
          $clangCl = Get-Command clang-cl -ErrorAction SilentlyContinue
          if (-not $clangCl) {
            Write-Error "clang-cl.exe not found on PATH. windows-latest used to ship LLVM under C:\Program Files\LLVM\bin -- check whether that's still the case."
            exit 1
          }
          clang-cl --version

      - name: Configure (release)
        shell: pwsh
        run: cmake --preset win-clang-release

      - name: Build
        shell: pwsh
        run: cmake --build build/win-clang-release --parallel

      - name: Stage artefact tree
        # Stage just what an end-user actually needs to run the engine
        # -- the binary plus the data files it loads (HDRI, BSC star
        # catalog, etc).  zip on Windows is the standard archive format
        # and PowerShell's Compress-Archive handles it natively without
        # an external tool.
        shell: pwsh
        run: |
          $stage = "demont-${{ steps.tag.outputs.value }}-windows-x64"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "build/win-clang-release/src/app/demont.exe"  "dist/$stage/"
          Copy-Item -Recurse "assets"                       "dist/$stage/"
          Copy-Item "LICENSE"                               "dist/$stage/"
          Copy-Item "README.md"                             "dist/$stage/"
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip" -Force
          Get-Item "dist/$stage.zip" | Select-Object Name, Length
          "ARCHIVE=dist/$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artefact (always)
        uses: actions/upload-artifact@v4
        with:
          name: demont-windows-x64
          path: ${{ env.ARCHIVE }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
          generate_release_notes: true
