# Copyright (c) 2026 Rajesh D'Monte
#
# Builds Embree once per (host platform × build config) with demont-engine's
# exact config (cmake/EmbreeConfig.cmake) and uploads the resulting .a / .lib
# + headers as assets on a GitHub Release tagged `vendored/embree-<v>`.
# cmake/EmbreeBinary.cmake on the consumer side then downloads the
# matching artefact instead of compiling Embree from source -- ~30 sec
# vs the ~10-15 min cold compile.
#
# Matrix this workflow produces per run (8 artefacts):
#   embree-<v>-macos-arm64-{release,debug}.tar.gz   (Apple Silicon, NEON)
#   embree-<v>-windows-x64-{release,debug}.zip      (clang-cl, AVX2 [+AVX-512])
#   embree-<v>-linux-x64-{release,debug}.tar.gz     (clang, AVX2 [+AVX-512])
#   embree-<v>-linux-arm64-{release,debug}.tar.gz   (clang, NEON; Pi/Graviton)
#
# Each per-platform job builds both Release AND Debug sequentially in
# one runner -- shares the Embree source fetch + tool install across
# the two configs so we don't pay for them twice.
#
# Triggers:
#   - workflow_dispatch: manual run from the Actions tab.  `force`
#     input bypasses the skip-if-exists check (useful for toolchain
#     bumps on the runner image without changing source).
#   - push to main: on changes to the Embree config (EmbreeConfig.cmake)
#     or the standalone prebuild project / workflow itself.  Auto-
#     fires so a config bump immediately produces fresh prebuilts.
#     PRs are intentionally NOT triggered -- we don't want feature-
#     branch CMake tweaks burning runner minutes until they actually
#     land on main.

name: Prebuild Embree

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even when the release asset already exists"
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths:
      - 'cmake/EmbreeConfig.cmake'
      - 'cmake/embree-prebuild/CMakeLists.txt'
      - '.github/workflows/prebuild-embree.yml'

concurrency:
  group: prebuild-embree-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}
      exists:  ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract EMBREE_VENDORED_VERSION
        id: ver
        run: |
          v=$(grep -E '^set\(EMBREE_VENDORED_VERSION' cmake/EmbreeConfig.cmake | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$v" ]; then
            echo "::error::Could not extract EMBREE_VENDORED_VERSION from cmake/EmbreeConfig.cmake"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=vendored/embree-$v" >> "$GITHUB_OUTPUT"
          echo "Resolved vendored version: $v"
      - name: Check if release tag already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  macos-arm64:
    name: Prebuild Embree (macOS arm64, Release + Debug)
    needs: resolve-version
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja cmake || true

      # Build Release + Debug sequentially in the same runner.  Each
      # one fetches Embree's source separately via FetchContent (could
      # be deduplicated with a shared FETCHCONTENT_BASE_DIR, but cmake's
      # subdirectory MakeAvailable will re-extract anyway -- runner
      # minutes saved aren't worth the extra plumbing).
      - name: Configure Release
        run: |
          cmake -S cmake/embree-prebuild -B build/Release \
                -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
                -DPT_ENABLE_AVX512_EMBREE=OFF
      - name: Build Release
        run: cmake --build build/Release --parallel
      - name: Stage + package Release
        run: |
          cmake --install build/Release --prefix dist/Release/embree
          v="${{ needs.resolve-version.outputs.version }}"
          tar -czf "dist/embree-$v-macos-arm64-release.tar.gz" -C dist/Release embree
          ls -lh "dist/embree-$v-macos-arm64-release.tar.gz"

      - name: Configure Debug
        run: |
          cmake -S cmake/embree-prebuild -B build/Debug \
                -G Ninja -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
                -DPT_ENABLE_AVX512_EMBREE=OFF
      - name: Build Debug
        run: cmake --build build/Debug --parallel
      - name: Stage + package Debug
        run: |
          cmake --install build/Debug --prefix dist/Debug/embree
          v="${{ needs.resolve-version.outputs.version }}"
          tar -czf "dist/embree-$v-macos-arm64-debug.tar.gz" -C dist/Debug embree
          ls -lh "dist/embree-$v-macos-arm64-debug.tar.gz"

      - name: Upload both to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.resolve-version.outputs.tag }}
          name:        "Vendored Embree ${{ needs.resolve-version.outputs.version }}"
          prerelease:  true
          files: |
            dist/embree-${{ needs.resolve-version.outputs.version }}-macos-arm64-release.tar.gz
            dist/embree-${{ needs.resolve-version.outputs.version }}-macos-arm64-debug.tar.gz
          fail_on_unmatched_files: true

  windows-x64:
    name: Prebuild Embree (Windows x64 clang-cl, Release + Debug)
    needs: resolve-version
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Verify clang-cl is on PATH
        shell: pwsh
        run: |
          $clangCl = Get-Command clang-cl -ErrorAction SilentlyContinue
          if (-not $clangCl) {
            Write-Error "clang-cl.exe not found on PATH"
            exit 1
          }
          clang-cl --version

      - name: Configure Release
        shell: pwsh
        run: |
          cmake -S cmake/embree-prebuild -B build/Release `
                -G Ninja -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_C_COMPILER=clang-cl `
                -DCMAKE_CXX_COMPILER=clang-cl `
                -DPT_ENABLE_AVX512_EMBREE=ON
      - name: Build Release
        shell: pwsh
        run: cmake --build build/Release --parallel
      - name: Stage + package Release
        shell: pwsh
        run: |
          cmake --install build/Release --prefix dist/Release/embree
          $v = "${{ needs.resolve-version.outputs.version }}"
          Compress-Archive -Path dist/Release/embree -DestinationPath "dist/embree-$v-windows-x64-release.zip" -Force
          Get-Item "dist/embree-$v-windows-x64-release.zip" | Select-Object Name, Length

      - name: Configure Debug
        shell: pwsh
        run: |
          cmake -S cmake/embree-prebuild -B build/Debug `
                -G Ninja -DCMAKE_BUILD_TYPE=Debug `
                -DCMAKE_C_COMPILER=clang-cl `
                -DCMAKE_CXX_COMPILER=clang-cl `
                -DPT_ENABLE_AVX512_EMBREE=ON
      - name: Build Debug
        shell: pwsh
        run: cmake --build build/Debug --parallel
      - name: Stage + package Debug
        shell: pwsh
        run: |
          cmake --install build/Debug --prefix dist/Debug/embree
          $v = "${{ needs.resolve-version.outputs.version }}"
          Compress-Archive -Path dist/Debug/embree -DestinationPath "dist/embree-$v-windows-x64-debug.zip" -Force
          Get-Item "dist/embree-$v-windows-x64-debug.zip" | Select-Object Name, Length

      - name: Upload both to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.resolve-version.outputs.tag }}
          name:        "Vendored Embree ${{ needs.resolve-version.outputs.version }}"
          prerelease:  true
          files: |
            dist/embree-${{ needs.resolve-version.outputs.version }}-windows-x64-release.zip
            dist/embree-${{ needs.resolve-version.outputs.version }}-windows-x64-debug.zip
          fail_on_unmatched_files: true

  linux-x64:
    name: Prebuild Embree (Linux x64 clang, Release + Debug)
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang

      - name: Configure Release
        run: |
          cmake -S cmake/embree-prebuild -B build/Release \
                -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DPT_ENABLE_AVX512_EMBREE=ON
      - name: Build Release
        run: cmake --build build/Release --parallel
      - name: Stage + package Release
        run: |
          cmake --install build/Release --prefix dist/Release/embree
          v="${{ needs.resolve-version.outputs.version }}"
          tar -czf "dist/embree-$v-linux-x64-release.tar.gz" -C dist/Release embree
          ls -lh "dist/embree-$v-linux-x64-release.tar.gz"

      - name: Configure Debug
        run: |
          cmake -S cmake/embree-prebuild -B build/Debug \
                -G Ninja -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DPT_ENABLE_AVX512_EMBREE=ON
      - name: Build Debug
        run: cmake --build build/Debug --parallel
      - name: Stage + package Debug
        run: |
          cmake --install build/Debug --prefix dist/Debug/embree
          v="${{ needs.resolve-version.outputs.version }}"
          tar -czf "dist/embree-$v-linux-x64-debug.tar.gz" -C dist/Debug embree
          ls -lh "dist/embree-$v-linux-x64-debug.tar.gz"

      - name: Upload both to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.resolve-version.outputs.tag }}
          name:        "Vendored Embree ${{ needs.resolve-version.outputs.version }}"
          prerelease:  true
          files: |
            dist/embree-${{ needs.resolve-version.outputs.version }}-linux-x64-release.tar.gz
            dist/embree-${{ needs.resolve-version.outputs.version }}-linux-x64-debug.tar.gz
          fail_on_unmatched_files: true

  linux-arm64:
    name: Prebuild Embree (Linux ARM64 clang, Release + Debug)
    needs: resolve-version
    # GitHub's ARM64 Linux runners (Cobalt-based, Ubuntu 24.04).
    # Available since Oct 2024; same apt + clang shape as ubuntu-latest.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang

      - name: Configure Release
        run: |
          cmake -S cmake/embree-prebuild -B build/Release \
                -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DPT_ENABLE_AVX512_EMBREE=OFF
      - name: Build Release
        run: cmake --build build/Release --parallel
      - name: Stage + package Release
        run: |
          cmake --install build/Release --prefix dist/Release/embree
          v="${{ needs.resolve-version.outputs.version }}"
          tar -czf "dist/embree-$v-linux-arm64-release.tar.gz" -C dist/Release embree
          ls -lh "dist/embree-$v-linux-arm64-release.tar.gz"

      - name: Configure Debug
        run: |
          cmake -S cmake/embree-prebuild -B build/Debug \
                -G Ninja -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DPT_ENABLE_AVX512_EMBREE=OFF
      - name: Build Debug
        run: cmake --build build/Debug --parallel
      - name: Stage + package Debug
        run: |
          cmake --install build/Debug --prefix dist/Debug/embree
          v="${{ needs.resolve-version.outputs.version }}"
          tar -czf "dist/embree-$v-linux-arm64-debug.tar.gz" -C dist/Debug embree
          ls -lh "dist/embree-$v-linux-arm64-debug.tar.gz"

      - name: Upload both to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.resolve-version.outputs.tag }}
          name:        "Vendored Embree ${{ needs.resolve-version.outputs.version }}"
          prerelease:  true
          files: |
            dist/embree-${{ needs.resolve-version.outputs.version }}-linux-arm64-release.tar.gz
            dist/embree-${{ needs.resolve-version.outputs.version }}-linux-arm64-debug.tar.gz
          fail_on_unmatched_files: true
