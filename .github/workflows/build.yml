name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow running from the Actions tab manually -- also useful for
  # forcing a nightly build outside the schedule.
  workflow_dispatch:
  # Nightly build trigger: 23:00 Asia/Kolkata (IST, UTC+5:30) = 17:30 UTC.
  # Cron is in UTC. GHA may delay scheduled runs by ~5-15min during
  # peak load; treat 11pm IST as a target, not a guarantee.
  schedule:
    - cron: '30 17 * * *'

# Cancel in-flight runs for the same branch when a newer push lands.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Apple Silicon)
    # macos-26 ships the macOS 26 SDK which declares MTLFXTemporalDenoisedScaler
    # (the API the engine's MetalFX denoiser uses). Earlier runner images
    # (macos-15 / Sequoia SDK) lack it; the engine's MetalFXDenoiser.mm is
    # SDK-version-gated to compile to no-op stubs on those, but using
    # macos-26 here means CI actually exercises the denoiser code path.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          # cmake + ninja are pre-installed on the macOS-15 runner image,
          # but pin via brew in case the runner image strips them later.
          # vulkan-headers + vulkan-loader give CMake's FindVulkan a
          # discoverable Vulkan::Vulkan target on macOS without needing
          # the full ~750MB LunarG SDK. molten-vk supplies the runtime
          # ICD (not strictly needed for compile-only CI, but cheap to
          # install and keeps the layout matching a dev box).
          brew install ninja cmake vulkan-headers vulkan-loader molten-vk || true
          cmake --version
          ninja --version

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build/mac-debug
          # Bust on CMakeLists / Dependencies changes since those drive
          # what FetchContent pulls. Source-only changes hit the cache.
          key: macos-build-${{ hashFiles('CMakeLists.txt', 'cmake/**', '**/CMakeLists.txt') }}
          restore-keys: |
            macos-build-

      - name: Configure
        # Vulkan ON -- exercises both Metal and Vulkan/MoltenVK backends
        # on the same runner so PRs can't silently break the Vk path.
        run: cmake --preset mac-debug

      - name: Build
        run: cmake --build build/mac-debug --parallel

      - name: Verify zero warnings
        # Fails the job if a build line printed a compiler warning.
        # Filter to lines that look like clang's "file:line:col:
        # warning:" so harmless info lines (like Slang's own E40100
        # which we suppressed via -Wno-40100) don't trip the gate.
        run: |
          cmake --build build/mac-debug --clean-first 2>&1 | tee build.log
          if grep -qE ":[0-9]+:[0-9]+: warning:" build.log; then
            echo "::error::Build emitted compiler warnings -- check build.log"
            grep -E ":[0-9]+:[0-9]+: warning:" build.log | head -20
            exit 1
          fi
          echo "Zero compiler warnings."

      - name: Unit tests (ctest)
        # Phase 1 test harness (issue #47). Runs every doctest-based
        # test registered via tests/CMakeLists.txt -- harness_smoke
        # canary + cvar_roundtrip + imgdiff_test + capture_format
        # today, more module tests as the rollout phases land.
        # --output-on-failure prints the doctest report inline when
        # a test fails so the CI log shows what broke without an
        # extra artefact download.
        #
        # The golden-image regression matrix (#45) cells are excluded
        # here (-LE golden) and run in a dedicated step below so a
        # render failure produces a downloadable PNG artefact instead
        # of just a log line.
        run: ctest --test-dir build/mac-debug --output-on-failure -LE golden

      # Golden-image regression matrix (#45) -- software backend only.
      # Metal + Vulkan cells exist in the matrix (one per primary host)
      # but are deliberately skipped on GH-hosted Mac runners because
      # the macos-26 image has only a paravirtualised GPU without
      # reliable hardware ray tracing, which the Metal CSG path
      # requires. Software backend uses Embree on the CPU and runs
      # everywhere. The Metal + Vulkan cells stay registered with
      # ctest so a self-hosted Mac runner (future) or a developer's
      # local box catches them; -L golden_software filters to the
      # subset that's safe here.
      - name: Golden-image regression matrix (software cell)
        # `|| true` lets the upload step below still run when the
        # cell fails; the step's own exit code is what fails the
        # job. Actual implementation: `set +e` then capture the rc.
        id: goldens
        run: |
          set +e
          ctest --test-dir build/mac-debug --output-on-failure -L golden_software
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          true

      - name: Upload golden-image diff artefacts
        # On failure (any golden_<...>_diff cell tripped above), the
        # build dir contains the diff PNGs heat-mapping where the
        # render diverged from the committed golden. Upload so a
        # reviewer can eyeball without re-running CI. if: always()
        # so a successful cell uploads its (likely empty) diff dir
        # too -- not strictly needed but keeps the step idempotent.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goldens-macos
          path: |
            build/mac-debug/golden_actual/
            build/mac-debug/golden_diff/
          if-no-files-found: warn
          retention-days: 14

      - name: Fail job if golden cell failed
        # The `goldens` step above swallowed its own rc into the
        # output so the upload step could run unconditionally. This
        # step propagates the real outcome to the job's exit code.
        if: steps.goldens.outputs.rc != '0'
        run: |
          echo "::error::Golden-image cell failed (rc=${{ steps.goldens.outputs.rc }}); see goldens-macos artefact."
          exit "${{ steps.goldens.outputs.rc }}"

      # Backend smoke tests (`demont --smoke-frames=N --r-backend=X`)
      # intentionally NOT run on the GH-hosted runner. The standard
      # macos-* runners have only a paravirtualized Apple GPU --
      # basic Metal renders but hardware ray tracing (which the engine
      # requires) doesn't work reliably, and the smoke tests would
      # either hang or fail-fast on no-device init. GitHub's paid
      # GPU runner offering (`gpu-t4-4-core`, Tesla T4) is gated to
      # Team / Enterprise plans and is Linux/Windows-only -- no
      # Apple-Silicon GPU runner exists at any tier. See PR #77 for
      # the full investigation.
      #
      # The engine-side `--smoke-frames` mode itself stays usable for
      # local dev + future self-hosted-runner CI. Run manually on real
      # hardware when validating a backend:
      #   ./build/mac-debug/src/app/demont --smoke-frames=8 --r-backend=metal
      #   ./build/mac-debug/src/app/demont --smoke-frames=8 --r-backend=vulkan
      # or end-to-end via the golden harness:
      #   ./build/mac-debug/tools/pt_render_one_frame/pt_render_one_frame \
      #     --scene tests/goldens/scenes/cornell_csg.cfg --backend metal \
      #     --denoiser off --frames 64 --out /tmp/out.png

  windows:
    name: Windows (NVIDIA RTX target)
    # Compile-test only -- the runner has no NVIDIA hardware so we can't
    # actually exercise the Vulkan path, but link errors and Windows-
    # specific compilation breakage get caught here. Same purpose as
    # the macos job: regression gate on PRs.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        # Configures the build environment (cl, link, etc.) so the Ninja
        # generator can find them. Required on windows-latest -- the
        # MSVC toolchain isn't on PATH by default.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Install Vulkan SDK
        # Pinned to a known-good LunarG release. The action's "latest"
        # tracking is brittle -- LunarG's CDN doesn't always publish
        # bleeding-edge versions at the URL pattern the action expects
        # (1.4.341.1's installer 404'd as of this commit). 1.3.296.0
        # is widely cached + has SPIR-V 1.6 + every extension we use.
        uses: jakoch/install-vulkan-sdk-action@v1.2.0
        with:
          vulkan_version: 1.3.296.0
          install_runtime: true
          cache: true
          stripdown: true

      - name: Verify toolchain
        shell: pwsh
        run: |
          ninja --version
          cmake --version
          echo "VULKAN_SDK = $env:VULKAN_SDK"

      - name: Configure
        shell: pwsh
        run: cmake --preset win-debug

      - name: Build
        shell: pwsh
        run: cmake --build build/win-debug --parallel

      - name: Unit tests (ctest)
        # See mac-debug job above for rationale. Golden cells are
        # excluded here and run in their own step so a render failure
        # produces a downloadable PNG artefact.
        shell: pwsh
        run: ctest --test-dir build/win-debug --output-on-failure -LE golden

      # Golden-image regression matrix (#45) -- software backend
      # only. The Windows runner has no usable Vulkan ICD beyond
      # validation-layer headers, so the vulkan cell would init-fail
      # the same way the smoke tests would. Software runs via Embree
      # on the CPU and works on every host.
      - name: Golden-image regression matrix (software cell)
        id: goldens
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          ctest --test-dir build/win-debug --output-on-failure -L golden_software
          "rc=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0

      - name: Upload golden-image diff artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goldens-windows
          path: |
            build/win-debug/golden_actual/
            build/win-debug/golden_diff/
          if-no-files-found: warn
          retention-days: 14

      - name: Fail job if golden cell failed
        if: steps.goldens.outputs.rc != '0'
        shell: pwsh
        run: |
          Write-Host "::error::Golden-image cell failed (rc=${{ steps.goldens.outputs.rc }}); see goldens-windows artefact."
          exit ${{ steps.goldens.outputs.rc }}

      # Backend smoke tests intentionally NOT run on the GH-hosted
      # windows-latest runner. The runner has no GPU hardware
      # (no NVIDIA, no AMD, no software Vulkan ICD beyond what we
      # don't install), so Vulkan init returns
      # VK_ERROR_INCOMPATIBLE_DRIVER and Software backend would only
      # exercise the CPU path. GitHub's paid Tesla-T4 GPU runners
      # ARE Linux/Windows-only but are gated to Team / Enterprise
      # plans, not available to public open-source repos. See PR #77
      # for the full investigation.
      #
      # Run manually on real RTX hardware when validating Vulkan:
      #   .\build\win-debug\src\app\demont.exe --smoke-frames=8 --r-backend=vulkan
      # or end-to-end via the golden harness:
      #   .\build\win-debug\tools\pt_render_one_frame\pt_render_one_frame.exe `
      #     --scene tests\goldens\scenes\cornell_csg.cfg --backend vulkan `
      #     --denoiser off --frames 64 --out C:\temp\out.png

  # Scheduled nightly release: at 23:00 IST (cron at top, in UTC) the
  # macos build runs and -- if it passes -- this job repackages the
  # release-config artefact and updates the `nightly` pre-release tag.
  # PRs and ad-hoc pushes do NOT churn the nightly tag (gated by
  # event_name); workflow_dispatch is allowed for manual nightlies
  # outside the schedule. Versioned releases (v0.1.0, ...) still flow
  # through release.yml on a tag push.
  nightly-release:
    name: Nightly release (scheduled)
    needs: macos
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    permissions:
      contents: write   # required to update the rolling tag's release
    steps:
      - uses: actions/checkout@v4

      - name: Skip if nightly already matches HEAD
        # If the existing `nightly` tag already points at this commit,
        # there's nothing new to publish -- short-circuit the job. Saves
        # ~3 minutes of CI per quiet day. softprops/action-gh-release
        # uses lightweight tags, so `git ls-remote refs/tags/nightly`
        # gives the commit SHA directly. workflow_dispatch always
        # rebuilds (the user explicitly asked for it).
        id: nightly_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch -- forcing rebuild"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PREV_SHA=$(git ls-remote origin refs/tags/nightly | awk '{print $1}')
          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" = "${GITHUB_SHA}" ]; then
            echo "nightly already at ${GITHUB_SHA}; skipping rebuild"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          else
            echo "rebuild needed: prev='${PREV_SHA}' current='${GITHUB_SHA}'"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        if: steps.nightly_check.outputs.skip != 'true'
        run: brew install ninja cmake vulkan-headers vulkan-loader molten-vk || true

      - name: Configure (release)
        if: steps.nightly_check.outputs.skip != 'true'
        run: cmake --preset mac-release

      - name: Build
        if: steps.nightly_check.outputs.skip != 'true'
        run: cmake --build build/mac-release --parallel

      - name: Stage artefact tree
        if: steps.nightly_check.outputs.skip != 'true'
        # Same layout as release.yml's tag-driven flow, just with a
        # 'nightly' filename + commit SHA so users can correlate.
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          STAGE="demont-nightly-${SHA_SHORT}-macos-arm64"
          mkdir -p "dist/$STAGE"
          cp build/mac-release/src/app/demont "dist/$STAGE/"
          cp -R assets                        "dist/$STAGE/"
          cp LICENSE README.md                "dist/$STAGE/"
          cd dist
          tar -czf "$STAGE.tar.gz" "$STAGE"
          ls -lh "$STAGE.tar.gz"
          echo "ARCHIVE=dist/$STAGE.tar.gz" >> "$GITHUB_ENV"
          echo "SHA_SHORT=$SHA_SHORT" >> "$GITHUB_ENV"

      - name: Update rolling 'nightly' release
        if: steps.nightly_check.outputs.skip != 'true'
        # action-gh-release force-updates the tag to whatever commit
        # main points to at run time and replaces the attached artefact,
        # so users hitting the 'nightly' release page always get the
        # latest scheduled build. `prerelease: true` keeps it out of the
        # "Latest" picker for users who only want versioned releases.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (latest main)"
          prerelease: true
          make_latest: false
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
          body: |
            Scheduled nightly build of `main` -- runs at 23:00 IST
            (Asia/Kolkata, UTC+5:30) every day. Skipped automatically
            when no new commits land between scheduled runs.
            Commit: `${{ env.SHA_SHORT }}` (${{ github.sha }}).

            For versioned, stable releases see the [tagged releases](https://github.com/havokentity/demont-engine/releases?q=v).
            This tag is force-updated on each scheduled run with new
            commits; the attached artefact reflects whatever was on
            `main` at run time.
