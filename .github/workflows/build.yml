name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow running from the Actions tab manually -- also useful for
  # forcing a nightly build outside the schedule.
  workflow_dispatch:
  # Nightly build trigger: 23:00 Asia/Kolkata (IST, UTC+5:30) = 17:30 UTC.
  # Cron is in UTC. GHA may delay scheduled runs by ~5-15min during
  # peak load; treat 11pm IST as a target, not a guarantee.
  schedule:
    - cron: '30 17 * * *'

# Cancel in-flight runs for the same branch when a newer push lands.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Apple Silicon)
    # macos-26 ships the macOS 26 SDK which declares MTLFXTemporalDenoisedScaler
    # (the API the engine's MetalFX denoiser uses). Earlier runner images
    # (macos-15 / Sequoia SDK) lack it; the engine's MetalFXDenoiser.mm is
    # SDK-version-gated to compile to no-op stubs on those, but using
    # macos-26 here means CI actually exercises the denoiser code path.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          # cmake + ninja are pre-installed on the macOS-15 runner image,
          # but pin via brew in case the runner image strips them later.
          # vulkan-headers + vulkan-loader give CMake's FindVulkan a
          # discoverable Vulkan::Vulkan target on macOS without needing
          # the full ~750MB LunarG SDK. molten-vk supplies the runtime
          # ICD (not strictly needed for compile-only CI, but cheap to
          # install and keeps the layout matching a dev box).
          brew install ninja cmake vulkan-headers vulkan-loader molten-vk || true
          cmake --version
          ninja --version

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build/mac-debug
          # Bust on CMakeLists / Dependencies changes since those drive
          # what FetchContent pulls. Source-only changes hit the cache.
          key: macos-build-${{ hashFiles('CMakeLists.txt', 'cmake/**', '**/CMakeLists.txt') }}
          restore-keys: |
            macos-build-

      - name: Configure
        # Vulkan ON -- exercises both Metal and Vulkan/MoltenVK backends
        # on the same runner so PRs can't silently break the Vk path.
        run: cmake --preset mac-debug

      - name: Build
        run: cmake --build build/mac-debug --parallel

      - name: Verify zero warnings
        # Fails the job if a build line printed a compiler warning.
        # Filter to lines that look like clang's "file:line:col:
        # warning:" so harmless info lines (like Slang's own E40100
        # which we suppressed via -Wno-40100) don't trip the gate.
        run: |
          cmake --build build/mac-debug --clean-first 2>&1 | tee build.log
          if grep -qE ":[0-9]+:[0-9]+: warning:" build.log; then
            echo "::error::Build emitted compiler warnings -- check build.log"
            grep -E ":[0-9]+:[0-9]+: warning:" build.log | head -20
            exit 1
          fi
          echo "Zero compiler warnings."

      - name: Unit tests (ctest)
        # Phase 1 test harness (issue #47). Runs every doctest-based
        # test registered via tests/CMakeLists.txt -- harness_smoke
        # canary + cvar_roundtrip today, more module tests as the
        # rollout phases land. --output-on-failure prints the doctest
        # report inline when a test fails so the CI log shows what
        # broke without an extra artefact download.
        run: ctest --test-dir build/mac-debug --output-on-failure

      # Smoke tests: boot the engine, render 8 frames, exit cleanly.
      # Catches device-init regressions, descriptor-binding regressions,
      # kernel-dispatch regressions that don't crash the build but
      # crash the runtime. Each backend runs in its own step so a Metal
      # regression doesn't mask a Software one. macOS GH runners are
      # real macOS VMs with a window server, so GLFW window creation
      # works -- the smoke tests do create a brief on-screen window
      # each run, which is fine on CI but explains why local devs see
      # a flash if they run these commands manually.
      #
      # timeout-minutes: 2 per step is the second line of defence
      # behind the engine's own kSmokeNoDeviceTimeoutSec (10s in
      # Engine::Run) -- if the in-engine fail-fast somehow regresses
      # and the loop hangs, GH Actions kills the step within 2 minutes
      # instead of burning the workflow's default 6-hour timeout.

      - name: Smoke test (Software backend)
        timeout-minutes: 2
        run: ./build/mac-debug/src/app/demont --smoke-frames=8 --r-backend=software

      - name: Smoke test (Metal backend)
        # Catches MetalDevice init, MTLDevice / MTLCommandQueue creation,
        # metal-cpp + metal-objc bridging glue, MetalSvgfDenoiser
        # compile-on-first-Denoise path, etc. Mac Apple Silicon only --
        # this step exists because the macOS runner is the only place
        # we get a real Metal stack.
        timeout-minutes: 2
        run: ./build/mac-debug/src/app/demont --smoke-frames=8 --r-backend=metal

      - name: Smoke test (Vulkan / MoltenVK backend)
        # MoltenVK on Apple Silicon. Catches: nullDescriptor / partially-
        # bound regressions (the v0.3.20 fix lives or dies on this step),
        # AS / RayQuery paths, MoltenVK extension plumbing. Note: the
        # CSG-on-Mac-Vulkan bug (#44) means rendered output is
        # incomplete here but the smoke test still passes -- it asserts
        # "boots + N frames + clean exit", not pixel-correctness. Pixel
        # correctness is the golden-matrix job's concern (#45).
        timeout-minutes: 2
        run: ./build/mac-debug/src/app/demont --smoke-frames=8 --r-backend=vulkan

  windows:
    name: Windows (NVIDIA RTX target)
    # Compile-test only -- the runner has no NVIDIA hardware so we can't
    # actually exercise the Vulkan path, but link errors and Windows-
    # specific compilation breakage get caught here. Same purpose as
    # the macos job: regression gate on PRs.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        # Configures the build environment (cl, link, etc.) so the Ninja
        # generator can find them. Required on windows-latest -- the
        # MSVC toolchain isn't on PATH by default.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Install Vulkan SDK
        # Pinned to a known-good LunarG release. The action's "latest"
        # tracking is brittle -- LunarG's CDN doesn't always publish
        # bleeding-edge versions at the URL pattern the action expects
        # (1.4.341.1's installer 404'd as of this commit). 1.3.296.0
        # is widely cached + has SPIR-V 1.6 + every extension we use.
        uses: jakoch/install-vulkan-sdk-action@v1.2.0
        with:
          vulkan_version: 1.3.296.0
          install_runtime: true
          cache: true
          stripdown: true

      - name: Verify toolchain
        shell: pwsh
        run: |
          ninja --version
          cmake --version
          echo "VULKAN_SDK = $env:VULKAN_SDK"

      - name: Configure
        shell: pwsh
        run: cmake --preset win-debug

      - name: Build
        shell: pwsh
        run: cmake --build build/win-debug --parallel

      - name: Unit tests (ctest)
        # See mac-debug job above for rationale.
        shell: pwsh
        run: ctest --test-dir build/win-debug --output-on-failure

      - name: Smoke test (Software backend)
        # See the mac-debug Software smoke test for rationale. Windows
        # has a desktop session on the GH runner so GLFW window
        # creation works fine. timeout-minutes is the second line of
        # defence behind Engine::Run's kSmokeNoDeviceTimeoutSec.
        shell: pwsh
        timeout-minutes: 2
        run: ./build/win-debug/src/app/demont.exe --smoke-frames=8 --r-backend=software

      # NOTE on the missing Windows Vulkan smoke step:
      #
      # The windows-latest GH runner has no GPU hardware and no
      # software Vulkan ICD installed by the workflow (only the LunarG
      # loader + headers, via install-vulkan-sdk-action). With no ICD,
      # vkCreateInstance returns VK_ERROR_INCOMPATIBLE_DRIVER and the
      # engine's Vulkan backend init fails -- which the smoke test's
      # kSmokeNoDeviceTimeoutSec correctly treats as a fatal failure
      # (exit code 2). That's a CI-environment limitation, not a
      # regression worth gating PRs on; the Mac Vulkan smoke step
      # already covers the MoltenVK path which is the most fragile.
      # When a Windows-NVIDIA self-hosted runner exists, add the
      # `--r-backend=vulkan` smoke step here (mirror the mac block).
      # Until then, intentionally omitted to keep the windows job
      # green.

  # Scheduled nightly release: at 23:00 IST (cron at top, in UTC) the
  # macos build runs and -- if it passes -- this job repackages the
  # release-config artefact and updates the `nightly` pre-release tag.
  # PRs and ad-hoc pushes do NOT churn the nightly tag (gated by
  # event_name); workflow_dispatch is allowed for manual nightlies
  # outside the schedule. Versioned releases (v0.1.0, ...) still flow
  # through release.yml on a tag push.
  nightly-release:
    name: Nightly release (scheduled)
    needs: macos
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    permissions:
      contents: write   # required to update the rolling tag's release
    steps:
      - uses: actions/checkout@v4

      - name: Skip if nightly already matches HEAD
        # If the existing `nightly` tag already points at this commit,
        # there's nothing new to publish -- short-circuit the job. Saves
        # ~3 minutes of CI per quiet day. softprops/action-gh-release
        # uses lightweight tags, so `git ls-remote refs/tags/nightly`
        # gives the commit SHA directly. workflow_dispatch always
        # rebuilds (the user explicitly asked for it).
        id: nightly_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch -- forcing rebuild"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PREV_SHA=$(git ls-remote origin refs/tags/nightly | awk '{print $1}')
          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" = "${GITHUB_SHA}" ]; then
            echo "nightly already at ${GITHUB_SHA}; skipping rebuild"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          else
            echo "rebuild needed: prev='${PREV_SHA}' current='${GITHUB_SHA}'"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        if: steps.nightly_check.outputs.skip != 'true'
        run: brew install ninja cmake vulkan-headers vulkan-loader molten-vk || true

      - name: Configure (release)
        if: steps.nightly_check.outputs.skip != 'true'
        run: cmake --preset mac-release

      - name: Build
        if: steps.nightly_check.outputs.skip != 'true'
        run: cmake --build build/mac-release --parallel

      - name: Stage artefact tree
        if: steps.nightly_check.outputs.skip != 'true'
        # Same layout as release.yml's tag-driven flow, just with a
        # 'nightly' filename + commit SHA so users can correlate.
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          STAGE="demont-nightly-${SHA_SHORT}-macos-arm64"
          mkdir -p "dist/$STAGE"
          cp build/mac-release/src/app/demont "dist/$STAGE/"
          cp -R assets                        "dist/$STAGE/"
          cp LICENSE README.md                "dist/$STAGE/"
          cd dist
          tar -czf "$STAGE.tar.gz" "$STAGE"
          ls -lh "$STAGE.tar.gz"
          echo "ARCHIVE=dist/$STAGE.tar.gz" >> "$GITHUB_ENV"
          echo "SHA_SHORT=$SHA_SHORT" >> "$GITHUB_ENV"

      - name: Update rolling 'nightly' release
        if: steps.nightly_check.outputs.skip != 'true'
        # action-gh-release force-updates the tag to whatever commit
        # main points to at run time and replaces the attached artefact,
        # so users hitting the 'nightly' release page always get the
        # latest scheduled build. `prerelease: true` keeps it out of the
        # "Latest" picker for users who only want versioned releases.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (latest main)"
          prerelease: true
          make_latest: false
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
          body: |
            Scheduled nightly build of `main` -- runs at 23:00 IST
            (Asia/Kolkata, UTC+5:30) every day. Skipped automatically
            when no new commits land between scheduled runs.
            Commit: `${{ env.SHA_SHORT }}` (${{ github.sha }}).

            For versioned, stable releases see the [tagged releases](https://github.com/havokentity/demont-engine/releases?q=v).
            This tag is force-updated on each scheduled run with new
            commits; the attached artefact reflects whatever was on
            `main` at run time.
