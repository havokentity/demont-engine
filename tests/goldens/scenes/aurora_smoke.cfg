# Aurora borealis smoke-test fixture (issue #116). Drives the engine
# into a night scene with the aurora overlay turned on and intensity
# cranked up so the green curtain is visible at smoke-frame render
# counts.
#
# Designed to be exec'd via:
#   pt_render_one_frame --scene tests/goldens/scenes/aurora_smoke.cfg \
#                       --backend metal \
#                       --denoiser svgf_atrous \
#                       --frames 32 \
#                       --out captures/aurora_smoke.png

# Render extent. 1024 x 768 so the aurora ribbons have enough room
# in the upper sky band that they are unambiguously visible in the
# capture.
app_window_width 1024
app_window_height 768

# Camera lock. Looking from a slightly elevated position, slightly
# upward (pitch +25) so most of the frame is sky and the upper-sky
# aurora band is in view. Yaw 0 puts +X to camera right and +Z to
# camera into-the-screen (the geographic-north convention the
# aurora shader uses for its pole-alignment vector). With
# r_aurora_lat 70 the pole-direction vector is roughly
# (0, 0.94, 0.34), so a forward = +Z looks slightly south of the
# pole and the curtain wraps from overhead to the horizon ahead.
cam_pos 0 1.5 0
cam_yaw 0
cam_pitch 25
cam_fov 70

# Sun at -10 deg elevation: well below the horizon, so day = 0 in
# the aurora shader's day/night gate and the curtain is at full
# brightness.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -10
r_sun_azimuth 180

# Path tracer. Minimal -- this fixture is about the post-denoise
# aurora composite, not path-tracer accuracy. 1 spp keeps each
# smoke frame fast.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

# Accum off and capture seed pinned, same as the cornell fixture --
# determinism.
r_accum_ema_alpha 0
r_capture_seed 1

# Denoiser on -- AuroraComposite is gated on use_engine_tonemap which
# is in turn gated on denoiser_active_. svgf_atrous is the default
# SVGF route on Metal and is the same route the StarsComposite golden
# uses.
r_denoiser svgf_atrous
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure. Auto-exposure would otherwise crank the night
# scene exposure way up and the aurora's nominal 1.5 cd/m^2 would
# blow out vs the sky. 1.5 is the same exposure cornell uses.
r_auto_exposure 0
r_exposure 1.5

# Aurora ON, intensity 1.5x (active-storm look), animation on so a
# multi-frame capture catches the curtain in a representative state.
r_aurora 1
r_aurora_intensity 1.5
r_aurora_lat 70
r_aurora_animate 1

# Stars / sun composite stays on as well so we can verify aurora
# doesn't overlap stars in the night sky.
r_star_split 1
r_show_stars 1

# Bloom + lens flare off to keep the smoke capture about the aurora
# only -- bloom would halo the green ribbons and add post-stack
# variables to the pixel test.
r_bloom 0
r_lens_flare 0

# Output format.
r_capture_format png
