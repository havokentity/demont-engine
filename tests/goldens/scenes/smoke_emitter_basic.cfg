#
# Fluid Phase 1 (#136) acceptance scene. Density-injection smoke
# plumes ride the existing cloud march. Validates:
#   1) emitter loop ADDS density on top of the procedural cloud field
#   2) plumes are sun-lit + sky-lit via the cloud march NEE pipeline
#   3) r_smoke_enabled gates the entire path tracer-side smoke loop

app_window_width 512
app_window_height 384

r_env_map ""
r_env_intensity 0.6

cam_pos 0 1.5 0
cam_yaw 90
cam_pitch 8
cam_fov 70

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 25
r_sun_azimuth 90

r_clouds 0
r_volumetric 0

r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0
r_hdr_pipeline 0
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 7

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

r_smoke_enabled 1
r_smoke_max_emitters 8
# Plume at chimney altitude in front of the camera. Sigma 4 m, density
# 5 per metre -- OD across the plume diameter ~40, effectively opaque.
smoke_emit 25 8 0 4.0 5.0
smoke_emit 40 12 -3 5.0 4.0
