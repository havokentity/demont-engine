#
# Fluid Phase 1 (#136) + Phase 2 (#180) + wave-6 ("looks like smoke")
# acceptance scene. Density-injection smoke plumes ride the existing
# cloud march. Validates:
#   1) emitter loop ADDS density on top of the procedural cloud field
#   2) plumes are sun-lit + sky-lit via the cloud march NEE pipeline
#   3) r_smoke_enabled gates the entire path tracer-side smoke loop
#   4) Phase 2 puff-chain renders the emitter as a tapering, dissipating
#      column rather than a single drifting blob (#180)
#   5) wave-6 visual upgrades make the column read as recognisable smoke:
#      turbulent wispy detail, self-shadowed sun-side bright / shadow-
#      side dark via Beer-Lambert background attenuation, exponential
#      age-fade tail, age-driven warm-to-cool tint gradient.

app_window_width 512
app_window_height 384

r_env_map ""
r_env_intensity 0.6

# Camera framed roughly head-on with the chimney plume mouth so the
# Phase 2 puff stratification + wave-6 turbulence detail read clearly.
# Pulled back from 0 -> -5 (along -X) and lifted to y=10 so the full
# rising column (head at the emitter mouth y=2, tail at y~14 after a
# 4 s vy=3 m/s advection) sits centred in the 512x384 viewport, with
# a slight downward pitch so the column foot doesn't run off the
# bottom edge.
cam_pos -5 10 0
cam_yaw 90
cam_pitch -8
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
# Sun azimuth 60 + elevation 20 = roughly back-side-lit. Camera looks
# +X so a sun direction with positive X component (azimuth in [0..180])
# means the sun is somewhat IN FRONT of the camera, BEHIND the smoke
# columns. This forward-scatter geometry produces the classic
# rim-lit-smoke silhouette where each puff catches a halo of sun light
# at its edges -- the lighting condition where smoke columns
# photograph most dramatically. The slight off-axis (60 not 90)
# keeps the sun OUT of frame so we see the smoke without the sun
# disc, but still benefits from the HG forward-scatter peak.
r_sun_elevation 20
r_sun_azimuth 60

r_clouds 0
r_volumetric 0

# wave-6: r_cloud_attenuate_background drives Beer-Lambert occlusion
# of the bright procedural sky behind the smoke column. Without it
# the smoke can only ADD brightness on top of the sky -- a near-
# saturated procedural sky already at the exposure ceiling means
# adding more brightness can't make smoke visible. With it ON the
# smoke transmittance multiplies the existing sky radiance through
# the column so dense smoke actually OCCLUDES the sky behind, which
# is the missing piece that turns "fuzzy brightness patch" into
# "recognisable dark smoke column against a bright sky".
r_cloud_attenuate_background 1

r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0
r_hdr_pipeline 0
r_auto_exposure 0
# Per-scene exposure tuned for the wave-6 darken-the-sky look.
r_exposure 0.18
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 7

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

r_smoke_enabled 1
r_smoke_max_emitters 4
# --- Fluid Phase 2 (#180) ---------------------------------------------------
# Each emitter becomes a chain of 12 puffs staggered across a 3 s lifetime
# (wave-6 bumped from 6 to 12 so the chain reads continuous rather than
# as discrete blobs). adv_strength=1.0 keeps the per-emitter velocity
# field meaning what it says (m/s); expansion_rate=0.25 broadens older
# puffs ~75 % over their lifetime so the column tapers fluffily.
r_smoke_lifetime           4.0
r_smoke_advection_strength 1.0
r_smoke_puff_count         16
r_smoke_expansion_rate     0.30
# --- Fluid wave-6 -- "looks like smoke" pass --------------------------------
# Turbulence + age-tint defaults tuned so the recognizable-smoke look
# triggers out-of-the-box. r_smoke_turbulence_scale=4 gives fine
# high-frequency wisps; r_smoke_turbulence_amplitude=0.6 means the
# density is modulated +/-60% by the noise, plenty of internal
# structure without hollowing the column. r_smoke_decay_shape=2
# (quadratic) keeps the head dense and lets the tail wisp away
# faster than the legacy linear fade. r_smoke_age_tint_strength=0.25
# applies a subtle warm-fresh / cool-old gradient.
r_smoke_turbulence_scale     0.8
r_smoke_turbulence_amplitude 1.0
r_smoke_decay_shape          2.5
r_smoke_age_tint_strength    0.3
# Two emitters: a dense foreground chimney and a thinner background
# wisp drifting slightly downwind. The 7th-9th args (vx vy vz) drive
# the Phase 2 puff-chain axis: vy=3 m/s with lifetime=4 s gives a
# ~12 m tall column above each emitter mouth. Foreground radius 1.2
# (smaller than wave-2's 2.5) so the column reads as narrow rather
# than as a fat oval; density 8 keeps it opaque under the wave-6
# Beer-Lambert background attenuation.
smoke_emit 22 2 0   0.8 12.0  0.0 3.0 0.0
smoke_emit 35 4 -5  1.2 7.0   0.4 2.5 0.0
