#
# Fluid Phase 1 (#136) + Phase 2 (#180) acceptance scene. Density-injection
# smoke plumes ride the existing cloud march. Validates:
#   1) emitter loop ADDS density on top of the procedural cloud field
#   2) plumes are sun-lit + sky-lit via the cloud march NEE pipeline
#   3) r_smoke_enabled gates the entire path tracer-side smoke loop
#   4) Phase 2 puff-chain renders the emitter as a tapering, dissipating
#      column rather than a single drifting blob (#180)

app_window_width 512
app_window_height 384

r_env_map ""
r_env_intensity 0.6

# Camera framed roughly head-on with the chimney plume mouth so the
# Phase 2 puff stratification reads clearly.
cam_pos 0 5 0
cam_yaw 90
cam_pitch 0
cam_fov 70

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 25
r_sun_azimuth 90

r_clouds 0
r_volumetric 0

r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0
r_hdr_pipeline 0
r_auto_exposure 0
# Per-scene exposure: smoke wave-2 puff-chain visual structure
# disappears at the global 0.05 default (20aa45b sweep). Override
# to 0.3 so the feature actually reads in the golden.
r_exposure 0.3
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 7

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

r_smoke_enabled 1
r_smoke_max_emitters 4
# --- Fluid Phase 2 (#180) ---------------------------------------------------
# Each emitter becomes a chain of 6 puffs staggered across a 3 s lifetime.
# adv_strength=1.0 keeps the per-emitter velocity field meaning what it
# says (m/s); expansion_rate=0.2 broadens older puffs ~60 % over their
# lifetime so the column reads as a fluffy tapering plume.
r_smoke_lifetime           3.0
r_smoke_advection_strength 1.0
r_smoke_puff_count         6
r_smoke_expansion_rate     0.20
# Two emitters: a dense foreground chimney and a thinner background
# wisp drifting slightly downwind. The 7th-9th args (vx vy vz) drive
# the Phase 2 puff-chain axis: vy=3 m/s with lifetime=3 s gives a
# ~9 m tall column above each emitter mouth.
smoke_emit 20 2 0   2.5 5.0  0.0 3.0 0.0
smoke_emit 35 4 -5  3.0 3.5  0.5 2.0 0.0
