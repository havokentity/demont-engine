# Wave 9 (#) acceptance scene -- Hosek-Wilkie physically-based sky.
# Daytime sun at +50 degrees elevation, azimuth 135 (SE). The camera is
# pitched up toward the zenith and yawed ANTI-SOLAR (azimuth 315, NW)
# so the frame shows the part of the dome the model must get right and
# the old fabricated coefficients got wrong:
#   * the deep-blue zenith and the zenith-to-horizon gradient (the
#     anti-solar sky is the most saturated blue, gamma ~70 deg at the
#     top of frame to ~130 deg near the horizon),
#   * horizon brightening / haze along the lower edge,
#   * the sun kept behind the camera so its bright forward-scatter glow
#     doesn't wash the frame to white and hide the hue (the sun-side
#     glow is still exercised by the model, just not framed here).
# This deliberately witnesses the blue zenith: the previous hand-tuned
# tables crushed the blue channel here (dark olive zenith, blue clamping
# to 0 at high turbidity). Turbidity is a clear-day 3.0 and the ground
# albedo a typical soil/vegetation 0.1 -- both real physical quantities.
#
# This cell exercises the Hosek path end-to-end: the visible sky-dome
# AND the diffuse skylight ambient on the ground plane both come from
# the same hosekSky() function, so a Lambert floor under a Hosek sky
# is lit by Hosek skylight (consistency the acceptance bar requires).
#
# Parser caveat (same as cornell_csg.cfg / procedural_noon.cfg): the
# console splits on both newline and semicolon, even inside comments.
# Keep comment text ASCII without semicolons or backticks so the parser
# doesn't leak script commands out of comment lines.

# Render extent matches the other golden fixtures (512x384) so the
# imgdiff tolerances stay calibrated on the same pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pitched up (28 deg) so the near-zenith sky fills the top
# of frame while a thin ground strip stays at the bottom, and yawed
# anti-solar (315 = NW, opposite the SE sun) so the deep-blue part of the
# dome -- the region the fix restores -- dominates the frame. cam_fov is
# the vertical FOV, so the frame spans view-elevation ~[-4.5, 60.5] deg.
cam_pos 0 1.5 4
cam_yaw 315
cam_pitch 28
cam_fov 65

# Sky: Hosek-Wilkie physically-based dome. Manual sun (no astronomical
# clock dependency on host wall time, for deterministic goldens). Sun
# at 50-deg elevation, azimuth 135 = SE.
r_sky_mode hosek
r_sky_use_astronomical 0
r_sun_elevation 50
r_sun_azimuth 135
# Real atmospheric turbidity (clear day) + typical ground albedo.
r_sky_turbidity 3.0
r_sky_ground_albedo 0.1

# Path tracer. Low spp + low bounces -- the daytime sky dominates fewer
# bounce paths so 1-spp suffices for a deterministic noise floor, same
# budget as procedural_noon.
r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure. Auto-exposure would couple pixel values to the
# frame-history accumulator across the smoke-frame budget.
r_auto_exposure 0
r_exposure 0.035

# Bloom off: the anti-solar frame has no HDR-bright sun glow to bloom, and
# leaving it on spreads the bright horizon haze up into the zenith on the
# Metal (bloom-capable) backend, washing out the very blue this cell exists
# to pin. Lens flare off too (post-stack feature, not in the correctness
# matrix). This keeps the cell a clean test of the Hosek dome hue.
r_bloom 0
r_lens_flare 0

# Star / moon disabled for daytime: hosekSky day-blends them out anyway,
# but pin the gates off so the cell is purely the daytime dome.
r_stars_aperture_samples 16
r_star_split 0
r_show_stars 0
r_dof 0
r_clouds 0

# Output. PNG required by imgdiff. Capture seed pins the PathTrace.slang
# PRNG so two runs on the same host produce identical pixels.
r_capture_format png
r_capture_seed 1

# A single Lambert ground plane so the lower frame is lit by Hosek
# skylight (the env-lighting consistency check). Mid-grey so the
# sky-driven ambient tint is visible on it.
prim_plane 1 0 1 0 0 lambert 0.55 0.55 0.55
