# Volumetric height fog (wave-9) acceptance scene. A long row of Lambert
# spheres marches away from the camera down the -Z axis above a ground
# plane, under a procedural sky with a low sun. With r_fog 1 the
# physically-based exponential-height fog (shaders/HeightFog.slang)
# integrates along each camera ray: the near spheres stay clear, the
# distant spheres fade into the fog colour, the ground recedes into haze
# at the horizon, and the sun side of the sky brightens via the
# Henyey-Greenstein forward-scatter lobe -- classic aerial perspective.
#
# Acceptance bar from the wave-9 task:
#   "r_fog 1 produces depth-correct fog (distant geometry fades, near
#    stays clear, sun-side brightens); default off preserves goldens."
#
# This fixture pins the r_fog 1 path. The r_fog 0 (default) path is a
# true no-op (the engine elides the dispatch) and is already covered
# bit-for-bit by every other committed golden, which is the "default off
# preserves goldens" half of the acceptance bar.
#
# Parser caveats match the other fixtures -- no semicolons or backticks
# anywhere (even inside comments) because the console splits scripts on
# both characters before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Low to the ground (y = 1.2 m) looking straight down the
# -Z axis (engine default forward), pitched down a touch so the row and
# the receding ground plane both fill the frame. The low eye height +
# near-horizontal view maximises the fog path length toward the horizon,
# so the aerial-perspective haze is unmistakable in the committed golden.
cam_pos 0 1.2 9
cam_yaw 0
cam_pitch -4
cam_fov 60

# Sky and sun. Procedural sky so the horizon haze blends into the sky
# gradient (the fog colour and the sky meet at the horizon). Sun low and
# slightly off the view axis: azimuth 35 (engine convention 0 = north =
# -Z, 90 = east = +X; see the sun-direction block in Engine.cpp) so the
# sun sits toward the upper right while the camera looks down -Z. That
# keeps the view rays near the sun direction -- the Henyey-Greenstein
# forward-scatter lobe brightens the haze on the sun side of the frame
# (the "sun-side brightens" acceptance point) -- while still front-lighting
# the near sphere enough that it keeps its colour and stays clearly
# defined (the "near stays clear" point). r_sky_use_astronomical 0
# decouples the render from the engine datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 12
r_sun_azimuth 35

# Volumetric height fog ON -- the feature under test. Real metric units.
#   r_fog_density 0.022 /m  -- moderate ground haze at the base height.
#                               Tuned so the near sphere (~3 m) keeps its
#                               colour while the far spheres (20-50 m)
#                               wash into the haze.
#   r_fog_base_y 0.0 m      -- fog base at the ground plane.
#   r_fog_scale_height 260 m -- e-folding height of the density falloff
#                               (a shallow boundary-layer haze: dense at
#                               ground, thinning with altitude).
#   r_fog_sun_anisotropy 0.7 -- strong forward scatter so the sun-side
#                               glow reads clearly.
#   r_fog_color_* a cool neutral haze (slightly blue).
# With r_fog 0 this whole pass is elided and the scene renders haze-free.
r_fog 1
r_fog_density 0.022
r_fog_base_y 0.0
r_fog_scale_height 260
r_fog_sun_anisotropy 0.7
r_fog_color_r 0.62
r_fog_color_g 0.68
r_fog_color_b 0.78

# Path tracer. Low spp keeps CI quick; the scene is Lambert + procedural
# sky so a couple of bounces settle the indirect. The golden harness
# accumulates many frames on top so the 1-spp noise floor stays well
# below the imgdiff tolerance.
r_spp 1
r_max_bounces 3
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0

# Accumulator. EMA off so the captured value is the running mean over the
# accumulated frames. r_capture_seed pins PathTrace.slang's pcgHash so two
# runs (or two hosts) converge modulo the noise floor the imgdiff
# tolerance absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence). Tuned
# so the lit spheres and the hazed sky both read without clipping.
r_auto_exposure 0
r_exposure 0.05

# Post effects off -- out of scope for the path-tracer-correctness matrix.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds so
# the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, mid grey) receding to the horizon -- the fog
# fades it into the haze colour with distance.
prim_plane 1 0 1 0 0 lambert 0.45 0.45 0.45

# The receding row -- eight Lambert spheres, radius 0.5 m, centred at
# y = 0.5 so they rest on the ground. They step in +X slightly as they
# step back in -Z so each stays visible (no view-axis stacking), but the
# dominant axis is depth: camera distances (camera at 0, 1.2, 9) run from
# ~3 m (nearest, id 10) to ~52 m (farthest, id 17). The near spheres stay
# crisp and saturated; the far ones wash out into the fog colour, so the
# depth-correct attenuation is read straight off the row. Each gets a
# distinct Lambert albedo so the fade is obvious per sphere.
prim_sphere 10 -0.6 0.5   6 0.5 lambert 0.90 0.25 0.25
prim_sphere 11  0.5 0.5   1 0.5 lambert 0.95 0.70 0.20
prim_sphere 12 -0.4 0.5  -5 0.5 lambert 0.30 0.75 0.35
prim_sphere 13  0.5 0.5 -11 0.5 lambert 0.25 0.55 0.95
prim_sphere 14 -0.4 0.5 -18 0.5 lambert 0.80 0.40 0.85
prim_sphere 15  0.5 0.5 -26 0.5 lambert 0.30 0.80 0.85
prim_sphere 16 -0.4 0.5 -35 0.5 lambert 0.95 0.85 0.40
prim_sphere 17  0.5 0.5 -45 0.5 lambert 0.85 0.85 0.90
