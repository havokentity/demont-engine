# Physics Phase 2a (#138) rigid-body smoke fixture. Mirrors phys_smoke.cfg
# but exercises the rigid-body path (phys_drop_sphere + phys_drop_box)
# instead of the Phase 1 particle path. Spawns a small mix of rigid
# spheres and rigid boxes above the ground plane so the integrator's
# orientation predictor + finite-diff omega + bounding-sphere collision
# all get hit on the first few frames.

app_window_width  640
app_window_height 480

cam_pos 0 2.5 6
cam_yaw 0
cam_pitch -15
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

r_spp 1
r_max_bounces 4
r_accum_ema_alpha 0

r_auto_exposure 0
r_exposure 0.5
r_bloom 0
r_lens_flare 0

r_capture_format png
r_capture_seed 1

phys_enabled 1

pt_smoke_late_exec tests/goldens/scenes/phys_rb_smoke_late.cfg
