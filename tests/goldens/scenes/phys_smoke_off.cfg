# Negative test: phys_enabled stays 0 so the physics step is a no-op
# and the engine behaves exactly like a non-physics build.
app_window_width  640
app_window_height 480

cam_pos 0 2.5 6
cam_yaw 0
cam_pitch -15
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

r_spp 1
r_max_bounces 4
r_accum_ema_alpha 0
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

phys_enabled 0
