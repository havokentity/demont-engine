#
# Water Phase 1 (#134) acceptance scene. Renders a MAT_WATER plane at
# y=0 with a half-submerged sphere visible through it.  Pins exactly
# the per-feature cvars the issue's acceptance criteria call out:
#   * Sun lit above the surface
#   * Sphere partially submerged so the camera sees both the above-
#     water rim and the refracted (Beer's-law-tinted) below-water cap
#   * Surface ripples animated via the normal-map waves
#
# Parser caveats mirror cornell_csg.cfg -- no semicolons or backticks
# anywhere in this file, even inside comments.

# Render extent matches the other golden fixtures.
app_window_width 512
app_window_height 384

# Camera lock.  Looking from (0, 1.0, 4) at a slight downward pitch so
# the water plane fills most of the lower half of the frame and the
# submerged sphere shows above + below the surface.
cam_pos 0 1.0 4
cam_yaw 0
cam_pitch -8
cam_fov 55

# Sky -- same procedural-noon setup as the other goldens.  Sun in
# upper-right so the surface picks up a specular highlight on the
# left-of-centre wave crests.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# Path tracer.  At least one refract bounce is required to see the
# submerged sphere through the water surface -- the issue's spec
# calls this out explicitly.  Caustics on so the surface re-focuses
# sun light onto whatever sits under the water (Phase 4 polish but
# free here via the existing #86 refractive NEE path).
r_spp 1
r_max_bounces 6
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.35
# Disable the HDRI env-map for the golden so the captured pixels are
# driven entirely by procedural sun + sky.  The default sunset.hdr
# washes the scene to high-key cream tones which obscure the water
# tinting we are showcasing.
r_env_map ""
r_env_intensity 0.6
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# Water tuning.  Match the Phase 1 cvar defaults verbatim so the
# acceptance image documents what the user gets out of the box.
# Wave speed 0 freezes the ripple field for deterministic golden
# captures -- the visible normal-map detail is still there, just
# not animated frame to frame.
r_water_absorption_r 0.45
r_water_absorption_g 0.15
r_water_absorption_b 0.05
r_water_ior 1.33
r_water_wave_scale 0.3
r_water_wave_amplitude 0.2
r_water_wave_speed 0.0

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture.  These cvars are read
# once during Init() before the seed calls -- they have no effect
# after the first frame, so they must be set before primitives.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Sea floor -- Lambert sandy tan, slightly below the water surface so
# the refracted view reads as "shallow pool".  Plane d=2 puts the
# floor at y=-2 -- the water surface sits at y=0 above.
prim_plane 1 0 1 0 2 lambert 0.75 0.60 0.35

# Water surface -- analytic plane at y=0, MAT_WATER.  The colour field
# is ignored for water (the BRDF uses water_params0 absorption) -- we
# pass a neutral 1,1,1 so any future debug-overlay that reads
# h.albedo on this material does not get a misleading tint.
prim_plane 2 0 1 0 0 water 1.0 1.0 1.0

# Half-submerged sphere.  Centre at y=0.3 with radius 0.6 means roughly
# half the sphere sits underwater (the camera at y=1 sees the upper
# half above and the lower half through the water).  Lambert red so
# the absorption tint reads clearly on the underwater portion.
prim_sphere 10 0.0 0.3 0.0 0.6 lambert 0.95 0.25 0.20

# Second sphere fully submerged off to the side as a deeper-water
# reference.  Centre at y=-0.6, radius 0.4 -- fully below the water
# plane, gives the eye something to compare the absorption tint
# against (the half-submerged sphere shows both above and below).
prim_sphere 11 1.3 -0.6 0.0 0.4 lambert 0.90 0.90 0.30
