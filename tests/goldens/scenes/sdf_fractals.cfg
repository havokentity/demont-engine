# SDF Phase 3 (#99) acceptance scene. Renders the headline iconic
# fractals -- Mandelbulb (centred), Mandelbox (left), Apollonian
# gasket (right) -- under the standard PT+GI pipeline.
#
# Acceptance bar from the issue. Mandelbulb + Mandelbox render with
# PT + GI. Silhouette noise is present but bounded, converges with
# spp.
#
# This fixture deliberately runs at 1 spp so the converge-with-spp
# behaviour is observable, AND the headline silhouette-noise floor
# of the DE approximation is visible. The test matrix should mark
# this fixture with an eps-tolerance mode, see issue #45 cross-link
# in #99.
#
# Parser caveats. NO semicolons or backticks anywhere in this file,
# even inside comments, because the console splits scripts on
# newline AND semicolon even on comment lines. The cornell_csg.cfg
# header documents the same hazard.

# Render extent matches the other golden fixtures so imgdiff
# tolerances stay calibrated on the same pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back along +Z far enough to frame all three
# fractals in a row across the X axis. Pitch slightly down to centre
# the y=0 row in the lower 2/3 of the frame.
cam_pos 0 0.8 5.5
cam_yaw 0
cam_pitch -5
cam_fov 50

# Sky -- bundled CC0 sunset HDRI. Fractal DEs (Mandelbulb in
# particular) are the heaviest distance function in the engine;
# layering procedural sky's curved-Earth atmospheric transmittance
# on top would push this fixture into single-digit-fps territory.
# HDRI provides bright-enough lighting that fractal silhouettes
# read cleanly + keeps iteration responsive. Sun/astro cvars are
# inert in hdri mode but preserved for cfg round-trip.
r_sky_mode hdri
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# Path tracer. 1 spp keeps CI quick AND surfaces the DE noise floor.
# The issue explicitly accepts a fidelity floor on fractal pixels.
# A few bounces for indirect. Firefly clamp prevents the DE-approx
# spec lobes from blowing up.
r_spp 1
r_max_bounces 4
r_firefly_clamp 8
r_caustics 1
r_refract_bounces 2
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# SDF iteration budget. Bump the sphere-trace step cap above the
# default 128 because fractal DEs cover less ground per step than
# analytic SDFs. The DE is a LOWER bound, never exact. 192 is a
# good Mandelbulb compromise. The issue caps the hard upper bound
# at 256 (clamped on host).
r_sdf_max_iters 192
r_sdf_epsilon 0.0008

# Fractal-side knobs (Phase 3 cvars).
#   r_sdf_fractal_power = 8 is the canonical Mandelbulb.
#   r_sdf_fractal_iters = 10 captures coarse detail at smoke-test
#       speeds. 12-14 looks sharper but costs proportionally more
#       per pixel.
#   r_sdf_de_eps_scale = 1.0 enables the iteration-relaxed
#       termination per the issue spec (dist below eps*scale*step).
#       0 falls back to the constant-epsilon trace.
r_sdf_fractal_power 8
r_sdf_fractal_iters 10
r_sdf_de_eps_scale 1.0

# Disable the default scene seeds so the fixture fully owns the
# render. These cvars are read once during Init before the seed
# calls. They don't affect anything after the first frame.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, light grey). Same convention as the other
# golden fixtures. Gives the fractals a horizon and a reference
# albedo level.
prim_plane 1 0 1 0 1.2 lambert 0.50 0.50 0.50

# --- Fractal triplet ---------------------------------------------------
# Three single-leaf fractal clusters across the X axis. Each
# carries its own per-shape scale and effective bound radius.
# Materials are all Lambert with distinct albedos so silhouettes
# are unambiguous in the capture.

# CENTRE: Mandelbulb (the headline fractal). Power 8 = canonical.
# Bound 1.25 m comfortably contains the bulb. The reachable extent
# of the textbook bulb sits inside r ~ 1.2 m for power 8.
sdf_mandelbulb 100 8 1.25 0 0 0 lambert 0.95 0.55 0.20

# LEFT: Mandelbox. Scale 2.5 is the canonical Tom-Lowe choice.
# Bound 3.0 m fits the limit set comfortably. Centred at x=-3.0.
sdf_mandelbox 101 2.5 3.0 -3.0 0 0 lambert 0.30 0.65 0.95

# RIGHT: Apollonian gasket. Scale 1.3 is canonical for the
# Apollonian-2 form from the Knighty thread. Bound 1.5 m fits the
# fundamental-domain limit set comfortably. Centred at x=+3.0.
sdf_apollonian 102 1.3 1.5 3.0 0 0 lambert 0.55 0.85 0.45
