# Late-exec fixture for phys_rb_demo.cfg (#181). Runs AFTER:
#   * Default cornell csg + analytic-prim seeds are skipped
#     (phys_rb_demo.cfg sets pt_smoke_skip_csg_seed=1 +
#     pt_smoke_skip_prim_seed=1, which also skips the default
#     ground plane -- we re-add it below via prim_plane)
#   * All physics console commands registered (phys_drop_sphere /
#     phys_drop_box / phys_drop resolve)
#
# Layout: a tidy stack of 3 rigid spheres (along x = -1.0, varying
# heights so they hit the ground at staggered frames) + a row of 3
# rigid boxes (along positive x, also staggered). All bodies start in
# the camera FOV with heights tuned so a single mid-flight screenshot
# (frame 60) catches the fall arc.
#
# Physics-time-per-render-frame note: smoke renders consume real wall
# time per frame (no fixed-dt), so 30 render frames is ~1-3s of
# physics depending on backend. Starting heights below are tuned for
# Metal at ~50ms/frame so frame 60 catches bodies mid-flight before
# they all settle on the ground.
#
# Box visual proxy: per Phase 2a (#138) boxes use the bounding-sphere
# collision shape AND are rendered as their bounding sphere too
# (shader work for proper box visuals is Phase 2b). Box half-extents
# (0.30, 0.25, 0.30) give a bounding-sphere radius ~0.50 which is
# visually distinct from the 0.40-radius tower spheres.
#
# Colors: phys_drop_sphere + phys_drop_box use their default Lambert
# tint here (warm tan + cool blue respectively). When the colored-
# rigid-bodies patch (#181 second prong) lands, this fixture can be
# updated to spawn each body in a distinct hue -- the bounding-sphere
# radii alone are enough visual distinction against the clean
# ground+sky stage that the demo still works at default colors.

# Re-add the ground plane that pt_smoke_skip_prim_seed removed. Same
# params as the engine default (id=4, normal +Y, d=0, Lambert gray).
prim_plane 4 0 1 0 0 lambert 0.55 0.55 0.55

# Tower of 3 spheres along x = -1.0, staggered heights so they don't
# all land in the same frame. Heights chosen so frame 60 (~1s of
# physics) catches the upper bodies mid-flight.
phys_drop_sphere -1.0 1.5 0.0 0.40 1.0
phys_drop_sphere -1.0 3.0 0.0 0.40 1.0
phys_drop_sphere -1.0 4.5 0.0 0.40 1.0

# Row of 3 boxes along positive x with staggered heights. Bounding
# sphere radius ~0.50 (from half-extents 0.30/0.25/0.30) is
# distinguishable from the 0.40-radius tower spheres.
phys_drop_box 0.8 1.8 0.0 0.30 0.25 0.30 1.0
phys_drop_box 1.7 3.3 0.0 0.30 0.25 0.30 1.0
phys_drop_box 2.6 4.8 0.0 0.30 0.25 0.30 1.0
