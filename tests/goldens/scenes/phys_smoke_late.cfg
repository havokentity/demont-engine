# Physics Phase 1 (#132) late-exec fixture. Runs AFTER:
#   * SeedDefaultPrimitives (so the ground plane at y=0 exists)
#   * SeedDefaultCsgScene
#   * All console commands registered (so phys_drop resolves)
#
# Spawns a small tower of physics-driven spheres above the ground
# plane. With phys_enabled=1 (set in phys_smoke.cfg) they fall, hit
# the analytic ground plane, and bounce until the per-substep damping
# bleeds the energy off.

phys_drop  0.0 4.0  0.0
phys_drop  0.5 5.5 -0.3
phys_drop -0.4 7.0  0.2
phys_drop  0.2 8.5 -0.5
