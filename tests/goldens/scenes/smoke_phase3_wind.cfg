#
# Fluid Phase 3 (#22) acceptance scene: SPH-driven smoke column with
# horizontal wind. The wind cvar leans the column sideways instead of
# straight-up. Validates:
#   1) r_smoke_mode sph engages the particle-based solver
#   2) emitters from smoke_emit feed the SPH spawn pipeline
#   3) r_smoke_wind_x lateral wind drives a visible column lean
#   4) Buoyancy makes hot emission rise against gravity
#   5) GPU SSBO at slot 16 / vk::binding 31 binds + the shader
#      smoke_sph_density_add loop runs

app_window_width 512
app_window_height 384

r_env_map ""
r_env_intensity 0.6

# Camera looking toward the emitter at world origin, roughly level
# (slight downward pitch) and pulled back so the full dense rising
# column sits centred in frame. The column rises in +Y; the +X wind
# drifts the rising smoke laterally (camera-LEFT at this yaw=180) so the
# downwind lean of the upper column is visible against the sky.
# Wave-9 phase-3b: lowered y 8->6, pitch -10->-2, pulled back -15->-18
# so the dense plume body reads as a tall mass rather than being viewed
# steeply from above.
cam_pos 0 6 -18
cam_yaw 180
cam_pitch -2
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 25
r_sun_azimuth 45

r_clouds 0
r_volumetric 0

# Beer-Lambert background attenuation so the smoke OCCLUDES the bright
# sky behind, the same lighting prep as smoke_emitter_basic.cfg.
r_cloud_attenuate_background 1

# --- Volumetric shading for a SOLID-reading plume (wave-9 phase-3b) ----------
# These are scene-local render knobs (they do NOT touch the SPH path or the
# procedural-smoke goldens). The wave-8 defaults washed the column flat:
#   * r_vol_multiscatter_bounces default 2 fills the self-shadowed core
#     with diffuse light -> no light/dark form, the plume reads as flat
#     haze. Drop to 1 so the sun-facing side stays bright and the shadow
#     side stays dark -- that light/dark gradient is what gives the column
#     3D body against a bright sky.
#   * r_vol_phase_g default 0.8 is a strong forward-scatter lobe; with the
#     sun partly behind the smoke that makes the whole column GLOW at sky
#     brightness (invisible). 0.35 keeps a gentle silver-lining without the
#     full forward-glow washout.
#   * r_vol_density_scale 1.5 thickens the per-step extinction so the core
#     goes optically thick (eye-ray transmittance -> 0) and genuinely
#     occludes the sky behind.
r_vol_multiscatter_bounces 1
r_vol_phase_g 0.35
r_vol_density_scale 1.5

r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0
r_hdr_pipeline 0
r_auto_exposure 0
# Wave-9 phase-3b: exposure lowered 0.18 -> 0.08. At 0.18 the procedural
# sky rendered near-white, so a sun-lit (also near-white) smoke column had
# almost no contrast against it -- the plume washed out regardless of how
# optically thick it was. 0.08 brings the sky down to a muted lavender-blue
# so the warm sun-lit smoke reads as a distinct, structured plume body.
r_exposure 0.08
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 7

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Master smoke gate; r_smoke_mode picks which solver feeds the GPU.
r_smoke_enabled 1
r_smoke_max_emitters 4
r_smoke_mode sph

# --- SPH solver tuning (wave-9 phase-3b: dense structured plume) ------------
# emit_rate 800/s * lifetime 5 s = 4000 steady-state, clamped to the 3072
# cap, so the coherent ~6 m column stays densely populated top-to-bottom
# (the headless harness only reaches ~3 s of sim, ~1500 live, before the
# capture). The wave-9 changes -- 2-lobe splat, low pressure stiffness,
# stable XSPH viscosity, curl-noise turbulence -- turn the wave-8 thin
# radial haze into a recognizable dense rising plume that leans into the
# wind.
r_smoke_sph_max_particles 3072
r_smoke_sph_emit_rate 800
r_smoke_sph_particle_lifetime 5.0
r_smoke_sph_particle_radius 0.35
r_smoke_sph_render_radius_scale 2.2
# Dense core: with the 2-lobe splat + tight column the per-particle peak
# goes optically thick at the core without an extreme scale.
r_smoke_sph_render_density_scale 3.0
r_smoke_sph_density_floor 0.0
r_smoke_buoyancy 0.75
r_smoke_emitter_temp 800
# Stable XSPH viscosity (wave-9): higher mu now SMOOTHS the column into a
# coherent body instead of detonating it (the wave-8 explicit-viscosity
# bug). 0.15 keeps the body cohesive while leaving enough internal
# velocity variation for visible billowing structure.
r_smoke_viscosity 0.15
# Very low pressure stiffness keeps the jet a tight rising COLUMN
# (~6 m wide, aspect ~3) rather than the wave-8 ~30 m diffuse radial
# haze. The stiff EOS repulsion is the dominant width driver.
r_smoke_pressure_stiffness 0.1

# --- Turbulence / structure (wave-9 phase-3b) -------------------------------
# Curl-noise gives the plume rising + curling structure; per-particle
# buoyancy variation gives it a billowing front instead of a rigid slug.
# Kept modest so the structure reads without re-widening the column.
r_smoke_curl_strength 3.0
r_smoke_curl_frequency 0.6
r_smoke_curl_time_rate 0.5
r_smoke_curl_lateral_gain 1.4
r_smoke_buoyancy_variation 0.2

# --- Wind -------------------------------------------------------------------
# Lateral +X wind drives the column to lean. Pure +X (no y/z component)
# so the test is unambiguous: the rising column drifts laterally (toward
# camera-LEFT at yaw=180) as it climbs. 4 m/s gives a visible downwind
# lean of the upper column against the vy=10 m/s vertical jet without
# flattening the dense body.
r_smoke_wind_x 4.0
r_smoke_wind_y 0.0
r_smoke_wind_z 0.0

# Procedural-mode legacy cvars are left at their defaults; only the
# emitter-list params are consumed when r_smoke_mode == sph.

# Single emitter at world (0, 2, 0). vy=10 m/s gives a strong upward jet
# so the parcels form a tall rising COLUMN before the wind + curl spread
# them, rather than a low radial splat (the wave-8 read). Buoyancy
# sustains the rise to ~y=20; the +X wind drifts the column camera-left.
# Emitter mouth radius 0.4 keeps the source compact.
smoke_emit 0 2 0  0.4 1.0  0.0 10.0 0.0
