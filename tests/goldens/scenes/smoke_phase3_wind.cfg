#
# Fluid Phase 3 (#22) acceptance scene: SPH-driven smoke column with
# horizontal wind. The wind cvar leans the column sideways instead of
# straight-up. Validates:
#   1) r_smoke_mode sph engages the particle-based solver
#   2) emitters from smoke_emit feed the SPH spawn pipeline
#   3) r_smoke_wind_x lateral wind drives a visible column lean
#   4) Buoyancy makes hot emission rise against gravity
#   5) GPU SSBO at slot 16 / vk::binding 31 binds + the shader
#      smoke_sph_density_add loop runs

app_window_width 512
app_window_height 384

r_env_map ""
r_env_intensity 0.6

# Camera looking from -Z toward +Z, with the emitter at world origin.
# The column rises in +Y and the +X wind makes it lean to the right
# (camera-right) in the captured frame -- so the lean is unambiguously
# visible.
cam_pos 0 8 -15
cam_yaw 180
cam_pitch -10
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 25
r_sun_azimuth 45

r_clouds 0
r_volumetric 0

# Beer-Lambert background attenuation so the smoke OCCLUDES the bright
# sky behind, the same lighting prep as smoke_emitter_basic.cfg.
r_cloud_attenuate_background 1

r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0
r_hdr_pipeline 0
r_auto_exposure 0
r_exposure 0.18
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 7

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Master smoke gate; r_smoke_mode picks which solver feeds the GPU.
r_smoke_enabled 1
r_smoke_max_emitters 4
r_smoke_mode sph

# --- SPH solver tuning ------------------------------------------------------
# 1024 particles is the default cap. emit_rate 200/s + lifetime 4s gives
# a steady-state population of ~800 particles -- enough for a coherent
# column without hitting the cap.
r_smoke_sph_max_particles 2048
r_smoke_sph_emit_rate 400
r_smoke_sph_particle_lifetime 5.0
r_smoke_sph_particle_radius 0.35
r_smoke_sph_render_radius_scale 2.5
r_smoke_sph_render_density_scale 5.0
r_smoke_sph_density_floor 0.0
r_smoke_buoyancy 0.75
r_smoke_emitter_temp 800
r_smoke_viscosity 0.05

# --- Wind -------------------------------------------------------------------
# Lateral +X wind drives the column to lean. Pure +X (no y/z component)
# so the test is unambiguous: the column should drift in +X.
r_smoke_wind_x 2.0
r_smoke_wind_y 0.0
r_smoke_wind_z 0.0

# Procedural-mode legacy cvars are left at their defaults; only the
# emitter-list params are consumed when r_smoke_mode == sph.

# Single emitter at world (0, 2, 0). vy=2 m/s gives an initial upward
# bias; buoyancy + wind do the rest. emitter centred on camera +Z so
# the wind-lean across the +X axis is visible camera-right.
smoke_emit 0 2 0  0.6 1.0  0.0 2.0 0.0
