# Wave 9 advanced materials -- anisotropic GGX (brushed metal) acceptance
# scene. A metal sphere wears the MAT_EXT_ANISOTROPIC lobe so the sun's
# specular highlight stretches into a brushed-metal STREAK instead of the
# round dot an isotropic GGX metal would show. Exercises:
#   * the Heitz-2014 anisotropic GGX D + Smith G2 (VNDF-sampled),
#   * the tangent frame derived from the shading normal + a rotation,
#   * the push-constant material-override path (prim_set_anisotropy), which
#     keeps the analytic-prim storage stride at 7 float4s.
#
# Acceptance bar: the highlight on the metal sphere reads as an elongated
# anisotropic streak (vertical here, because aniso amount is negative ->
# stretched along the bitangent). An isotropic metal under the same sun
# would show a compact circular highlight.
#
# Parser caveats match cornell_csg.cfg / spectral_prism.cfg -- NO
# semicolons or backticks anywhere (even in comments): the console splits
# scripts on both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back + pitched down a touch to frame the brushed-
# metal sphere on the ground plane and put the sun's highlight squarely
# on the sphere's upper hemisphere.
cam_pos 0 1.4 4
cam_yaw 0
cam_pitch -12
cam_fov 55

# Sun and sky. Procedural sky (no astronomy dependence) with a bright sun
# placed high and behind the camera so its specular reflection lands on
# the sphere's upper hemisphere facing the viewer -- that reflected sun
# disc is what the anisotropic lobe stretches into a vertical streak.
# r_sky_use_astronomical 0 decouples from datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 42
r_sun_azimuth 0
# Cinematic sun size bump: a larger reflected sun disc gives the
# anisotropic GGX lobe something broad to stretch, so the brushed streak
# reads clearly at this resolution (a real 0.55deg sun reflects as a tiny
# dot that no amount of anisotropy visibly elongates). r_sun_size only
# scales the disc's apparent radius -- the radiance is unchanged.
r_sun_size 7

# Path tracer. spp 1 keeps CI quick; the golden harness accumulates 64
# frames so the VNDF-sampled specular noise settles. A few bounces let
# the metal pick up bounce light off the ground.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

# Accumulator. EMA off so the captured value is the running mean over the
# accumulated frames. r_capture_seed pins the PRNG so two runs / hosts
# converge to the same pixels modulo the noise floor imgdiff absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence).
r_auto_exposure 0
r_exposure 0.06

# Post effects off -- out of scope for the path-tracer-correctness matrix
# and bloom would bleed the highlight streak.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds so
# the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, mid grey). Plane equation n . p + d = 0 with
# n = +y, d = 0 puts it at y = 0.
prim_plane 1 0 1 0 0 lambert 0.45 0.45 0.45

# Brushed-metal sphere. metal material, warm steel albedo (this IS the
# specular F0 -- a metal reflects its own colour), roughness 0.22 so the
# reflected sun disc is bright but the anisotropic stretch elongates it
# into an obvious streak (a near-mirror would show a tight dot, a fully
# rough surface would wash the streak out). radius 0.8, centred at y=0.8
# so it rests on the ground.
prim_sphere 10 0 0.8 0 0.8 metal 0.85 0.86 0.90 0.35

# Anisotropic GGX lobe. amount -0.85 stretches the microfacet roughness
# strongly (a brushed finish); rotation 90 deg spins the tangent frame so
# the highlight elongates HORIZONTALLY across the sphere's equator -- the
# unmistakable brushed-metal streak (an isotropic metal would show a round
# highlight; rotating this param re-aims the streak, proving the lobe is
# genuinely anisotropic and tangent-frame-steered). This sets
# MAT_EXT_ANISOTROPIC on the prim and routes (amount, rotation) through
# PtPush's mat_overrides array (prim storage stride untouched).
prim_set_anisotropy 10 -0.85 90
