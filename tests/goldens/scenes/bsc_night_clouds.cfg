#
# Golden-image regression matrix (issue #112) -- night sky + clouds.
# Sun far below horizon at -45 deg, BSC stars on, volumetric clouds
# enabled. Exercises:
#   * Volumetric cloud march + sigma_t extinction
#   * Cloud transmittance G-buffer occlusion of celestials
#     (the path that PR #110 commit 69e9bf2 added)
#   * Star + cloud composite ordering (clouds in front -> star occluded)
#   * Moon + cloud composite (same as stars)
#
# This is the cell that catches: "clouds added but no longer occlude
# stars/moon" regressions, which the bsc_night cell alone could miss.
#
# Parser caveat: ASCII only, no semicolons or backticks in comments.

app_window_width 512
app_window_height 384

# Camera pitched up to put both clouds + stars in frame. Same pose as
# bsc_night so a side-by-side comparison of "with vs without clouds"
# shows just the cloud occlusion delta.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch 30
cam_fov 60

# Sky: procedural with astronomical-time-pinned BSC. Same date+time as
# bsc_night so the star positions match (the only golden delta should
# be cloud occlusion in front of the stars). r_sun_elevation /
# r_sun_azimuth are intentionally OMITTED here: with
# r_sky_use_astronomical=1 the engine recomputes the sun position
# from the pinned date/hour, so any manual cvar values would be
# silently overwritten. The pinned 2026-01-01 22:00 UTC has the sun
# well below the horizon at Chennai, which is what we want.
r_sky_mode procedural
r_sky_use_astronomical 1
r_sky_year 2026
r_sky_month 1
r_sky_day 1
r_sky_hour 22
r_sky_hour_local 0

# Stars: BSC catalog + star-split composite enabled.
r_stars_mode bsc
r_stars_twinkle 1
r_stars_twinkle_speed 0.3
r_star_split 1
r_stars_aperture_samples 16

# Clouds: cumulus preset, moderate coverage. r_clouds_seed pinned so
# the cloud noise pattern is deterministic across runs. Wind off so
# the cloud field doesn't drift between captured frames (the smoke-frame
# run accumulates N frames -> if wind > 0 the captured frame would
# depend on simulated dt accumulation, which varies across CI hosts).
r_clouds 1
r_clouds_preset cumulus
r_clouds_coverage 0.55
r_clouds_density 0.08
r_clouds_seed 1
r_clouds_wind_x 0
r_clouds_wind_z 0

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

r_auto_exposure 0
r_exposure 2.0

r_bloom 1
r_lens_flare 0

# Moon disc dimmed to zero so the rendered disc + halo do not compete
# with the BSC starmap focus of this cell. Note: r_moon_brightness is
# a disc/halo multiplier only -- the moon's astronomical position and
# phase still feed the moon-NEE path that lights the cloud volume
# (PathTrace.slang single-scatter NEE uses moon_dir_phase + phase
# directly, independent of r_moon_brightness). With astronomical mode
# pinned to the date above, that moon contribution to cloud lighting
# is deterministic and part of what this fixture captures. The cell
# tests star+cloud composite ordering, not moon-isolation -- moon-disc
# coverage lives in lunar_night.
r_moon_brightness 0
r_dof 0

r_capture_format png
r_capture_seed 1
