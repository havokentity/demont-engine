#
# Wave 10 polygonal-bokeh acceptance scene. A field of small, very bright
# emissive spheres sits well behind the focus plane, so each one defocuses
# into a large, clearly-shaped bokeh. With a HEXAGONAL aperture
# (r_dof_blades 6) plus a blade rotation and cat's-eye edge vignetting,
# those bokeh render as six-sided polygons -- squeezed into lemon shapes
# toward the frame edge -- instead of round discs.
#
# Acceptance bar: out-of-focus point-like highlights rendering as
# HEXAGONAL bokeh (vs the circular bokeh the sibling dof_bokeh cell pins).
# Small bright emitters (rather than the large lit spheres dof_bokeh uses)
# are what make the aperture SHAPE unmistakable: a defocused point source
# images the aperture, so a hexagonal iris stamps a hexagon. The
# aperture-sample warp maps the concentric disk onto a regular N-gon, so
# f-stop drives the bokeh size and the blade count drives the polygon side
# count -- real optics, not a post-process polygon stamp.
#
# Parser caveats match the other fixtures -- no semicolons or backticks
# anywhere (even inside comments) because the console splits scripts on
# both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Looking from (0, 1.2, 8) straight down -Z at the field of
# emitters, ground at y=0. A small downward pitch frames the emitters
# across the middle of the frame so the cat's-eye squeeze (which grows
# toward the edges) is visible on the outermost bokeh.
cam_pos 0 1.2 8
cam_yaw 0
cam_pitch -4
cam_fov 55

# Sky and sun. Procedural sky with the sun parked below the horizon so
# the sky is dark and the emissive points are the only bright sources --
# their hexagonal bokeh reads cleanly against a near-black background.
# r_sky_use_astronomical 0 decouples the render from the engine datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -14
r_sun_azimuth 200

# --- The feature under test ---------------------------------------------
# Depth of field ON with a HEXAGONAL iris. The focus plane is at 1.5 m --
# far IN FRONT of the emitter field at ~14-20 m -- and the aperture is
# opened wide via the explicit r_dof_aperture world-radius override
# (0.18 m, a deliberately dramatic "fast cine lens wide open" so the
# defocused points blow up into large, unmistakable bokeh in a 512x384
# golden). r_dof_blades 6 warps the aperture sample onto a regular
# hexagon, r_dof_blade_rotation 15 orients it, and r_dof_cateye 0.7
# squeezes the edge bokeh into lemons. With r_dof_blades 0 + r_dof_cateye
# 0 this collapses to the circular bokeh the dof_bokeh cell pins
# bit-for-bit. (r_dof_fstop / focal_length are still set for
# documentation, but r_dof_aperture > 0 overrides them with the explicit
# world radius -- the physical f-stop -> radius path is exercised by the
# dof_bokeh cell.)
r_dof 1
r_dof_fstop 1.8
r_dof_focal_length_mm 85
r_dof_focus_distance_m 1.5
r_dof_aperture 0.18
r_dof_blades 6
r_dof_blade_rotation 15
r_dof_cateye 0.7
# ------------------------------------------------------------------------

# Path tracer. High spp because the wide-open aperture integrates a large
# bokeh -- every sample lands on a different point of the hexagonal iris,
# so the bokeh polygons need many samples per frame to fill in cleanly.
# The golden harness accumulates 64 frames on top (64 * 32 = 2048 aperture
# samples per pixel), which settles the large bokeh footprints to a smooth
# fill. Two bounces are plenty (emissive points + dark Lambert ground).
r_spp 32
r_max_bounces 2
r_firefly_clamp 12
r_caustics 0
r_refract_bounces 0

# Accumulator. EMA off so the captured value is the running mean over
# the accumulated frames. r_capture_seed pins the PRNG so two runs (or
# two hosts) converge modulo the noise floor the imgdiff tolerance
# absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence).
# Raised well above the dof_bokeh cell's level because each point's
# energy is now spread over a large bokeh footprint (the wide aperture),
# so the per-pixel radiance inside each hexagon is much lower -- this
# exposure lifts the hexagonal bokeh to a bright, readable fill while the
# dark ground + sub-horizon sky stay near-black behind them.
r_auto_exposure 0
r_exposure 0.10

# Post effects off -- bloom would smear the bokeh polygons into round
# blobs and is out of scope for this aperture-shape cell.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, dark grey) so the frame is mostly dark and the
# hexagonal bokeh dominate.
prim_plane 1 0 1 0 0 lambert 0.10 0.10 0.10

# The emitter field -- small (radius 0.09 m) very bright emissive
# spheres at ~14-20 m, spread across X and Y so their defocused hexagonal
# bokeh tile the frame. Each is driven hard into HDR (emission ~25-35) so
# the core clips and the bokeh images the full aperture. The outermost
# columns sit near the frame edge so the cat's-eye lemon squeeze shows.
# Stepped depths add slight bokeh-size variation (nearer = bigger circle
# of confusion).
prim_sphere 20 -4.5 2.6 -6 0.09 lambert 0 0 0
prim_set_emission 20  30.0 8.0 8.0
prim_sphere 21 -1.6 3.0 -7 0.09 lambert 0 0 0
prim_set_emission 21  8.0 30.0 12.0
prim_sphere 22  1.6 2.8 -6 0.09 lambert 0 0 0
prim_set_emission 22  10.0 14.0 34.0
prim_sphere 23  4.5 2.5 -5 0.09 lambert 0 0 0
prim_set_emission 23  34.0 26.0 8.0
prim_sphere 24 -3.0 0.9 -7 0.09 lambert 0 0 0
prim_set_emission 24  30.0 18.0 28.0
prim_sphere 25  0.0 1.1 -8 0.09 lambert 0 0 0
prim_set_emission 25  28.0 28.0 28.0
prim_sphere 26  3.0 0.8 -6 0.09 lambert 0 0 0
prim_set_emission 26  12.0 30.0 30.0
prim_sphere 27 -4.8 4.4 -7 0.09 lambert 0 0 0
prim_set_emission 27  26.0 10.0 30.0
prim_sphere 28  4.8 4.6 -7 0.09 lambert 0 0 0
prim_set_emission 28  30.0 30.0 12.0
