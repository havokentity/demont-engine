# SDF Phase 2 (#98) acceptance scene. Exercises every Phase 2 op:
#   * noise-displaced ground plane via sdf_displace_noise
#   * a tall twisted box via sdf_twist
#   * a bent column via sdf_bend
#   * a row of repeated spheres via sdf_repeat_limited (so the AABB
#     is finite -- infinite sdf_repeat would render correctly but
#     widen the cluster AABB to the +/-1000m fallback)
#
# Acceptance bar from the issue:
#   "Noise-displaced ground renders with correct normals at all
#    displacement scales (no shading discontinuities)."
#   "Forward-mode normals match central-diff to within 1e-3 absolute
#    on test SDFs (sanity check, not bit-exact)."
#
# Parser caveats are the same as cornell_csg.cfg and the Phase 1
# sdf_smin_row.cfg -- no semicolons or backticks even inside comments.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back / up to see the displaced ground from
# above and frame the procedural shapes in the back row.
cam_pos 0 2.5 9
cam_yaw 0
cam_pitch -12
cam_fov 55

# Sky -- same procedural-noon setup as the other goldens.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# Path tracer. Low spp keeps CI quick.
r_spp 1
r_max_bounces 3
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.25
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# SDF iteration budget. Phase 2 procedural ops chew step budget --
# bump iter cap a bit (default 128 is fine but lets us trace through
# the displaced field without misses). Forward-AD normals (default 0).
r_sdf_max_iters 192
r_sdf_epsilon 0.0001
r_sdf_normal_mode 0
r_sdf_displace_octaves 4

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# --- ground -------------------------------------------------------------
# A flat box "ground slab" then noise-displaced into rolling terrain.
# Box is 8 m wide on X/Z and 0.5 m thick on Y, centred at y=-0.5 so its
# top sits at y=0. Then wrap with sdf_displace_noise: amp=0.25 m
# (visible terrain), freq=0.5 / m (0.5 cycles per metre = 2 m
# wavelength), 5 octaves for some detail.
sdf_box 1 4 0.25 4 0 -0.5 0 lambert 0.45 0.55 0.40
sdf_displace_noise 2 1 0.25 0.5 5 lambert 0.45 0.55 0.40

# --- twist column -------------------------------------------------------
# A skinny tall box twisted around its vertical axis. Centre at
# (-2, 1, 0), half-extents (0.3, 1.0, 0.3). Twist rate 1.8 rad/m of
# height -> about 1 full turn over the 2 m span.
sdf_box 10 0.3 1.0 0.3 -2 1 0 metal 0.85 0.55 0.20
sdf_twist 11 10 1.8 metal 0.85 0.55 0.20

# --- bend column --------------------------------------------------------
# A capsule bent along X to make a smooth arch. Centre at (2, 1.2, 0),
# half-height 1.0, radius 0.3. Bend rate 0.5 rad/m.
sdf_capsule 20 1.0 0.3 2 1.2 0 lambert 0.30 0.55 0.85
sdf_bend 21 20 0.5 lambert 0.30 0.55 0.85

# --- repeated spheres ---------------------------------------------------
# A row of small spheres repeated along the X axis with limited extent.
# Base sphere at origin (translation applied via period clustering),
# period 0.6 m on X, half-extent 3 cells -> 7 spheres centred at the
# origin. Limited so the cluster AABB stays finite and visible.
sdf_sphere 30 0.18 0 1.8 -2.5 lambert 0.85 0.30 0.45
sdf_repeat_limited 31 30 0.6 0 0 3 0 0 lambert 0.85 0.30 0.45
