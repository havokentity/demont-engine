#
# Wave 10 bloom + lens-dirt acceptance scene. A cluster of bright
# emissive spheres against a near-black sky drives the energy-preserving
# dual-filter bloom pyramid (13-tap Karis-average downsample, tent-
# filter upsample) hard, and the procedural lens-dirt overlay smears the
# resulting halos through a screen-space grime field -- the look of a
# bright source seen through an uncleaned camera front element.
#
# Acceptance bar: bloom halos around the bright spheres, modulated by a
# streaky dirt field (bright smudges catch the glow, clean glass between
# them stays darker, the frame edges sheen). r_bloom_strength is pushed
# above neutral so the halos read clearly in a committed 512x384 golden,
# and r_lens_dirt 1 + r_lens_dirt_strength 0.8 make the grime obvious.
#
# Parser caveats match the other fixtures -- no semicolons or backticks
# anywhere (even inside comments) because the console splits scripts on
# both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Looking from (0, 1.6, 6) straight down -Z at the cluster
# of emissive spheres centred near the origin, ground at y=0. A small
# downward pitch frames the spheres in the upper-middle of the frame so
# the bloom halos and the edge sheen of the dirt both read.
cam_pos 0 1.6 6
cam_yaw 0
cam_pitch -6
cam_fov 55

# Sky and sun. Procedural sky with the sun parked well below the horizon
# so the sky is dark and the emissive spheres are the only bright
# sources -- the bloom halos and the dirt modulating them stand out
# against the near-black background instead of competing with a lit sky.
# r_sky_use_astronomical 0 decouples the render from the engine datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -12
r_sun_azimuth 200

# Depth of field off -- this cell is about bloom + dirt, not bokeh. The
# bokeh cell (dof_bokeh_blades) covers the aperture path.
r_dof 0

# Path tracer. Modest spp; the golden harness accumulates many frames on
# top. Two bounces are plenty (emissive spheres + Lambert ground).
r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0

# Accumulator. EMA off so the captured value is the running mean over
# the accumulated frames. r_capture_seed pins the PRNG so two runs (or
# two hosts) converge modulo the noise floor the imgdiff tolerance
# absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence).
# Tuned so the bright emissive cores clip to white and bloom hard while
# the dark ground + sub-horizon sky stay near-black, giving the halos +
# dirt the contrast they need to read.
r_auto_exposure 0
r_exposure 0.12

# --- The feature under test ---------------------------------------------
# Bloom ON with an above-neutral strength so the halos are bold, and the
# procedural lens-dirt overlay ON at a strong mix so the grime field
# clearly modulates the bloom. With r_bloom 0 this whole scene is a
# halo-free render (already covered by the bloom-off goldens), and with
# r_lens_dirt 0 the bloom add is the clean energy-preserving pyramid.
r_bloom 1
r_bloom_threshold 1.0
r_bloom_intensity 0.20
r_bloom_strength 1.8
r_bloom_radius 1.5
r_bloom_mips 5
r_lens_dirt 1
r_lens_dirt_strength 0.85
# ------------------------------------------------------------------------

# Lens flare off -- it also samples the bloom mip and would add ghost
# discs that fight the dirt-modulated halos this cell pins.
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, dark grey) so the frame is mostly dark and the
# bloom halos + dirt sheen dominate.
prim_plane 1 0 1 0 0 lambert 0.12 0.12 0.12

# A cluster of bright emissive spheres, radius 0.5 m, floating at
# y = 1.1 so they sit in the upper-middle of the frame. Each has a
# distinct emission colour and is driven well into HDR (values ~12-18)
# so the cores clip and feed the bloom pyramid strongly. Stepped in X so
# their halos overlap into a wide bright band that the dirt field then
# breaks up.
prim_sphere 10 -2.2 1.1 0 0.5 lambert 0 0 0
prim_set_emission 10  16.0 4.0 4.0
prim_sphere 11 -0.75 1.1 0 0.5 lambert 0 0 0
prim_set_emission 11  4.0 16.0 6.0
prim_sphere 12  0.75 1.1 0 0.5 lambert 0 0 0
prim_set_emission 12  6.0 8.0 18.0
prim_sphere 13  2.2 1.1 0 0.5 lambert 0 0 0
prim_set_emission 13  18.0 14.0 4.0
