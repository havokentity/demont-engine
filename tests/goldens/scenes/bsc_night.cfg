# Golden-image regression matrix (issue #112) -- BSC night sky scene.
# Sun far below horizon at -45 deg. Stars enabled with BSC starmap.
# Exercises:
#   * Astronomical/procedural blended branch with sun far below
#   * BSC (Bright Star Catalog) star rendering
#   * Star-split composite path (r_star_split 1) -- the specific
#     regression that motivated issue #112 (PR #114 fix)
#   * StarsComposite.slang post-denoise add-back path (replaces the
#     retired Tonemap.slang stars_tex composite from earlier PRs)
#   * Per-star twinkle modulation (cheap shader noise on visible stars)
#
# Parser caveat: console splits on newline and semicolon even inside
# comments. ASCII only.

app_window_width 512
app_window_height 384

# Camera pitched up so the upper sky (where stars live) dominates
# the framebuffer. Ground plane just out of frame.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch 30
cam_fov 60

# Sky: procedural. Sun far below horizon (no sun-disc contribution,
# sky background goes to nightblue + stars).
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -45
r_sun_azimuth 135

# Stars: BSC catalog mode (real Yale Bright Star Catalog), twinkle on.
# Astronomical-mode 1 needed for BSC star transform (J2000 -> horizon)
# to be computed against a deterministic time -- pin date + hour.
r_sky_use_astronomical 1
r_sky_year 2026
r_sky_month 1
r_sky_day 1
r_sky_hour 22
r_sky_hour_local 0
r_stars_mode bsc
r_stars_twinkle 1
r_stars_twinkle_speed 0.3
r_star_split 1
r_stars_aperture_samples 16

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure boosted for night render (sky is dim, stars are
# point-bright but small in screen space).
r_auto_exposure 0
r_exposure 2.0

# Bloom enabled (bright point stars + dim sky is exactly the case
# bloom is for). Lens flare off (not in path-tracer matrix).
r_bloom 1
r_lens_flare 0

# Moon explicitly off here (BSC starmap is the focus of this cell --
# moon is tested separately in lunar_night).
r_moon_brightness 0
r_dof 0
r_clouds 0

r_capture_format png
r_capture_seed 1
