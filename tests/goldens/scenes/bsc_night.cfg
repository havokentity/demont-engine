# Golden-image regression matrix (issue #112) -- BSC night sky scene.
# Sun far below horizon (astronomical, pinned to 2026-01-01 22:00 UTC at
# Chennai = deep local night, sun well below horizon). Stars enabled
# with BSC starmap. Exercises:
#   * Astronomical/procedural blended branch with sun far below
#   * BSC (Bright Star Catalog) star rendering
#   * Star-split composite path (r_star_split 1) -- the specific
#     regression that motivated issue #112 (PR #114 fix)
#   * StarsComposite.slang post-denoise add-back path (replaces the
#     retired Tonemap.slang stars_tex composite from earlier PRs)
#   * Per-star twinkle modulation (cheap shader noise on visible stars)
#
# Parser caveat: console splits on newline and semicolon even inside
# comments. ASCII only.

app_window_width 512
app_window_height 384

# Camera pitched up so the upper sky (where stars live) dominates
# the framebuffer. Ground plane just out of frame.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch 30
cam_fov 60

# Sky: procedural with astronomical-time-pinned BSC. BSC star
# rendering requires astronomical mode on so the J2000 -> horizon
# transform is computed against a deterministic time -- we pin
# date + hour below. With astronomical mode on the engine recomputes
# the sun position from the pinned date/lat/lon, so a manual
# r_sun_elevation / r_sun_azimuth would be silently overwritten and
# is intentionally omitted. The pinned 2026-01-01 22:00 UTC at the
# default Chennai lat/lon puts the sun deep below the horizon, which
# is the night-sky regime we want.
r_sky_mode procedural
r_sky_use_astronomical 1
r_sky_year 2026
r_sky_month 1
r_sky_day 1
r_sky_hour 22
r_sky_hour_local 0
r_stars_mode bsc
r_stars_twinkle 1
r_stars_twinkle_speed 0.3
r_star_split 1
r_stars_aperture_samples 16

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure boosted for night render (sky is dim, stars are
# point-bright but small in screen space).
r_auto_exposure 0
r_exposure 1.5

# Bloom enabled (bright point stars + dim sky is exactly the case
# bloom is for). Lens flare off (not in path-tracer matrix).
r_bloom 1
r_lens_flare 0

# Moon disc dimmed to zero here so the rendered disc + halo do not
# compete with the BSC starmap that is the focus of this cell. Note:
# r_moon_brightness is a disc/halo multiplier only -- the moon's
# astronomical position and phase still feed the moon-NEE path. In
# this fixture that does not matter because (a) clouds are off, and
# (b) the camera is pitched 30 deg up with the ground out of frame,
# so moon NEE on scene geometry cannot land on visible pixels.
# Dedicated moon-disc + composite coverage lives in lunar_night.
r_moon_brightness 0
r_dof 0
r_clouds 0

r_capture_format png
r_capture_seed 1
