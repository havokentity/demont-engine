#
# Planar-Earth A/B counterpart to sunset_altitude.cfg (issue #51).
# Identical to that fixture except r_planet_radius is forced to 0,
# which routes atmosphericTransmittance back through the legacy
# planar-exponential analytical integral and disables the procSky
# visible-horizon dip. Used to visually confirm the spherical model
# is actually producing different output at altitude.
#
# Parser-safety: no semicolons or backticks anywhere in this file
# (including comments). The engine console splits scripts on both
# newline AND semicolon, even inside hash-prefixed comment lines.

app_window_width 640
app_window_height 360

cam_pos 0 10000 0
cam_yaw -90
cam_pitch 0
cam_fov 50

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 2
r_sun_azimuth 90

r_volumetric 1
r_volumetric_density 0.002
r_volumetric_anisotropy 0.7
r_volumetric_intensity 1.0
r_volumetric_samples 16
r_rayleigh 30

r_clouds 0

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0

r_accum_ema_alpha 0

r_auto_exposure 0
r_exposure 0.05

r_bloom 0
r_lens_flare 0

r_denoiser off

# THE A/B SWITCH: planar mode -- legacy 1/sin(elev) airmass, no
# horizon dip in procSky. This should reproduce pre-issue-51 output.
r_planet_radius 0

r_capture_format png
r_capture_seed 1
