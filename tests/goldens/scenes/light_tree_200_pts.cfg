# 200 random point lights for light tree (#129) variance test.
# Generated with random seed 7. The same fixture is used with
# r_light_tree=1 (tree path) and r_light_tree=0 (naive) to
# A/B the variance reduction the tree gives at 1 spp / 200 lights.

app_window_width 720
app_window_height 480

cam_pos 0 6 14
cam_yaw 0
cam_pitch -22
cam_fov 55

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -30
r_sun_azimuth 0
r_show_stars 0
r_star_split 0

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0
r_accum_ema_alpha 0
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 1.0
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground + a sphere so the shadow / falloff pattern is readable.
prim_plane 1 0 1 0 0 lambert 0.70 0.70 0.70
prim_sphere 10 0 1 0 1 lambert 0.85 0.85 0.85

# 200 point lights spread across a 24x24m floor patch at y=2.5m.
# Intensity range 0.5..6 W/sr -- low enough that no single light
# dominates a pixel, so variance from per-pixel pick is highly
