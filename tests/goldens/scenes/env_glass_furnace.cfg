# Env double-count-through-dielectrics regression scene (2026-07-13 audit,
# finding B9). A Lambert floor under an infinite dielectric SLAB, lit by a
# uniform white-furnace IBL. Exercises the exact path the bug corrupted:
#
#   1. A Lambert floor vertex does env-map NEE. Its shadow ray refracts
#      up through the glass slab (r_caustics 1, r_refract_bounces 4), so
#      transmittance() returns a non-zero tint and the NEE fully counts the
#      sky arriving through the glass.
#   2. The BSDF-sampled bounce ray from that same vertex refracts up through
#      the same slab (two dielectric interfaces) and misses to the sky.
#
# Before the fix, the MAT_DIELECTRIC branch reset the sky-on-miss suppression
# (skip_sky_on_miss / prev_was_lambert_nee) after the FIRST refraction, so
# step 2's sky-on-miss was added at FULL weight on top of step 1's NEE -- a
# clean double count. The Lambert floor under the slab converged up to ~2x
# brighter than energy conservation allows. The fix persists those flags
# across the refraction chain so the miss is MIS-weighted (or suppressed)
# exactly as the single-segment case already did.
#
# White-furnace framing: the IBL is a UNIFORM 0.375-gray dome
# (assets/hdri/uniform_gray.hdr, below the 0.5 light-extraction floor so the
# env-map CDF stays uniform -- no fake sun cluster). r_env_intensity 2.667
# lifts the effective radiance to L = 1.0, so an albedo-1 Lambert surface
# converges to exitant ~1.0 (furnace invariance) and any double count shows
# as an over-bright floor / clipped sphere top. The albedo-1 reference sphere
# makes the invariance readable at a glance.
#
# Parser caveats match cornell_csg.cfg / spectral_prism.cfg -- no semicolons
# or backticks anywhere (even inside comments) because the console splits
# scripts on both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff tolerances
# stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera above the slab, looking steeply down so the whole lower frame is the
# Lambert floor + spheres viewed THROUGH the glass slab. The steep pitch
# keeps camera rays off the grazing angles where the slab would total-
# internal-reflect (a bright horizon band); the floor fills the frame.
cam_pos 0 4.2 3.0
cam_yaw 0
cam_pitch -52
cam_fov 55

# Sky. HDRI mode sampling the uniform furnace dome. This is the mode the
# bug lives in (env-map NEE + MIS). r_mis 1 is the engine default but pinned
# here because the double count is a MIS-path bug.
r_sky_mode hdri
r_env_map assets/hdri/uniform_gray.hdr
r_env_intensity 2.667
r_mis 1

# Path tracer. Caustics ON with a 4-bounce refract budget so NEE shadow rays
# refract through the two slab interfaces. r_max_bounces 6 gives the BSDF
# path room to cross both slab faces and still reach the sky.
r_spp 1
r_max_bounces 6
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

# Accumulator. EMA off so the captured value is the running mean over the
# 64 accumulated frames. r_capture_seed pins the PRNG so runs converge to
# the same pixels modulo the noise floor the imgdiff tolerance absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence). Tuned so
# the L=1.0 furnace floor / spheres sit in the upper-mid range after ACES,
# leaving headroom for a regression's over-bright double count to read.
r_auto_exposure 0
r_exposure 0.5

# Post effects off -- out of scope for the path-tracer-correctness matrix.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds so the
# scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Lambert floor (plane n=(0,1,0), d=0 -> y=0), mid grey so the double count
# has headroom before clipping.
prim_plane 1 0 1 0 0 lambert 0.60 0.60 0.60

# The dielectric slab: two infinite parallel planes with OUTWARD normals so
# the ndi-based enter/exit logic treats the gap between them as glass.
#   bottom face y=1.0, normal (0,-1,0) -> n.p + d = -y + d = 0 -> d = 1.0
#   top face    y=1.3, normal (0, 1,0) -> n.p + d =  y + d = 0 -> d = -1.3
# Both start at the plane default IOR 1.0 (air); prim_set_ior lifts them to
# 1.5 (crown glass) so they actually refract + Fresnel-reflect.
prim_plane 2 0 -1 0 1.0  dielectric 1.0 1.0 1.0
prim_plane 3 0  1 0 -1.3 dielectric 1.0 1.0 1.0
prim_set_ior 2 1.5
prim_set_ior 3 1.5

# Furnace reference sphere: albedo 1.0 Lambert, radius 0.4 centred at
# (-0.9, 0.4, 0) so its top (y=0.8) clears the slab bottom (y=1.0). Under a
# uniform L=1.0 dome it must converge to a flat ~1.0 everywhere (furnace
# invariance) -- a regression that double counts the through-slab env pushes
# its upper hemisphere past 1.0 and clips.
prim_sphere 10 -0.9 0.4 0 0.4 lambert 1.0 1.0 1.0

# Mid-grey companion sphere (albedo 0.5) at (0.9, 0.4, 0) for a second
# brightness reference at a different albedo.
prim_sphere 11 0.9 0.4 0 0.4 lambert 0.5 0.5 0.5
