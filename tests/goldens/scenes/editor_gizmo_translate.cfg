# Smoke fixture for the editor 3D-transform gizmo (issue: editor 3D gizmos).
# Drops a single bright sphere onto a ground plane, calls gizmo_select to
# focus the gizmo on it, then renders one frame so the resulting PNG has
# the X/Y/Z arrow triad visible over the sphere.
#
# This is not a golden-matrix cell: the gizmo is a UI overlay rendered
# post-tonemap, so pixel-correctness regressions in PathTrace are
# unaffected by it. The fixture exists as a smoke / visual verification
# artifact -- run via `pt_render_one_frame --scene editor_gizmo_translate
# --backend metal --out frame.png` and eyeball the result.

app_window_width 512
app_window_height 384

cam_pos 0 1.5 4
cam_yaw 0
cam_pitch -5
cam_fov 60

# Simple sky -- we just want enough illumination to read the sphere
# silhouette so the gizmo overlay reads clearly.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 90

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.5
r_bloom 0
r_lens_flare 0
r_star_split 0
r_dof 0
r_clouds 0

# Sphere + ground plane. The default CSG drilled-cube is left in place
# -- it sits at the origin alongside our sphere, which is fine for a
# visual gizmo smoke (the gizmo will still draw over the sphere at
# (0, 1, 0)). Calling csg_remove 3 to clear the cube triggers a
# pre-existing engine segfault on the smoke-exec path, unrelated to
# this PR; once that bug is fixed in a follow-up the cube can be
# removed for a cleaner stage.
pt_smoke_skip_csg_seed 1
prim_clear
prim_sphere 1 0 1 0 0.5 lambert 0.85 0.20 0.20
prim_plane 2 0 1 0 0 lambert 0.40 0.40 0.45

# Focus the editor gizmo on the sphere. The gizmo cvar defaults to 1
# (master enabled) and "translate" (mode), so the kernel will rasterize
# the three axis arrows over the sphere's centre.
gizmo_select 1

r_capture_format png
r_capture_seed 1
