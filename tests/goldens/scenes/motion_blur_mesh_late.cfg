#
# Mesh motion blur late-exec fixture (wave-7 #21). Runs AFTER:
#   * SeedDefaultCsgScene (box - sphere CSG mesh queued for bake)
#   * SeedDefaultPrimitives (analytic sphere + plane prims live)
#   * RegisterCsgCommands (mesh_step / mesh_pos / mesh_motion_reset
#     registered with the Console)
#
# Translates the CSG mesh by one canonical frame of motion (2 m/s ×
# 1/60 s = 0.033 m in +X). Couples to r_motion_blur 1 in the parent
# motion_blur_mesh.cfg so the shader's stochastic shutter-time
# sampler smears the mesh from origin to +0.033 m. The streak is
# visible as soft edges on the moving mesh, distinct from the
# sharp-edged analytic-sphere render of cornell_csg.

mesh_step 0.033 0 0
