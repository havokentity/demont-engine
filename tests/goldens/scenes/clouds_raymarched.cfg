# Wave 7 (#24) -- procedural-raymarched cloud mode regression coverage.
# Same scene as clouds_godrays.cfg but with r_clouds_mode flipped to
# procedural_raymarched. Exercises the dedicated raymarch pre-pass +
# alpha composite path; pins it for golden comparison so the pre-pass
# stays bit-stable across refactors.
#
# Pixels won't match clouds_godrays.cfg pixel-for-pixel -- the raymarch
# uses different sample counts, no multi-scatter octaves, and the
# Schneider powder term. But within the raymarched mode the output is
# deterministic per-config (temporal alpha 0 + capture seed pinned).

# Render extent. Same as clouds_godrays.cfg so comparison is direct.
app_window_width 768
app_window_height 432

# Procedural sky.
r_sky_mode procedural
r_sky_use_astronomical 0

# Sun position -- 8 degrees elevation east. Matches clouds_godrays.cfg.
r_sun_elevation 8
r_sun_azimuth 90

# Camera looking east at sunset, pitched up so cloud layer fills the
# upper half. Matches clouds_godrays.cfg.
cam_pos 0 80 0
cam_yaw 90
cam_pitch 10
cam_fov 80

# Clouds -- cumulus preset with reduced coverage so the layer is
# visible but gappy. Same params as clouds_godrays.cfg for direct
# visual comparison.
r_clouds_preset custom
r_clouds 1
r_clouds_coverage 0.65
r_clouds_base_height 250
r_clouds_top_height 800
r_clouds_density 0.15
r_clouds_freq 0.003
r_clouds_detail 0.35
r_clouds_wind_x 0
r_clouds_wind_z 0
r_clouds_seed 3

# Wave 7 (#24): procedural raymarched cloud mode.
r_clouds_mode procedural_raymarched
r_clouds_raymarched_light_steps 6
r_clouds_raymarched_samples 32
# Temporal alpha 0 so the output is bit-deterministic for the golden.
r_clouds_raymarched_temporal_alpha 0.0
r_clouds_raymarched_resolution_scale 1.0

# Phase 4 cvars (cloud march shared parameters).
r_vol_density_scale 1.0
r_vol_phase_g 0.85
r_vol_multiscatter_bounces 2

# Atmospheric haze.
r_volumetric 1
r_volumetric_density 0.008
r_volumetric_anisotropy 0.80
r_volumetric_intensity 2.0
r_volumetric_samples 32
r_rayleigh 30

# Path tracer.
r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0

# Denoiser. Required so the engine allocates cloud_trans_tex (and the
# raymarched pass's clouds_color ping-pong pair); the raymarched cloud
# pre-pass shares that lifecycle.
r_denoiser svgf_atrous
r_svgf_atrous_passes 2
r_hdr_pipeline 1

# Manual exposure.
r_auto_exposure 0
r_exposure 0.05

# Bloom and flare off.
r_bloom 0
r_lens_flare 0

# PNG output.
r_capture_format png

# Capture seed pinned.
r_capture_seed 42
