#
# FFT ocean surface (Wave 8, #25) acceptance scene. Renders a large
# MAT_WATER plane driven by the CPU Tessendorf FFT solver (pt::ocean::
# OceanFFT): a Phillips-spectrum height field, time-evolved by the
# deep-water dispersion w = sqrt(g*k), inverse-FFT'd to a displacement +
# normal texture the path tracer ray-marches off the analytic water
# plane. Camera sits low over the water looking toward a low sunset sun
# so the animated wave crests catch a long specular glitter path.
#
# What this fixture pins:
#   * r_ocean 1 engages the FFT solver + the heightfield ray-march
#   * The displacement / normal textures bind at engine slots 14 / 15
#     (vk::binding 32 / 33) and the shader's MAT_WATER branch samples
#     them instead of the Phase 1 flat analytic-plane wave normal
#   * Real physics: g = 9.81, wind 12 m/s, dispersion w = sqrt(g*k)
#   * Choppy crests + foam where the displacement Jacobian folds
#
# Parser caveats mirror cornell_csg.cfg -- no semicolons or backticks
# anywhere in this file, even inside comments.

# Render extent matches the other golden fixtures.
app_window_width 512
app_window_height 384

# Camera lock. Over the water (y = 8 m) looking out toward the horizon
# with a downward pitch so the displaced ocean fills the lower half of
# the frame and the sunset sky sits above it. Yaw 0 faces +Z; the sun
# azimuth below puts the sun ahead-and-right for a glitter path across
# the wave crests. The 8 m eye height keeps the camera above the tallest
# crests so the surface reads as a continuous sea rather than the camera
# being swamped between waves.
cam_pos 0 8.0 0
cam_yaw 0
cam_pitch -10
cam_fov 60

# Sunset sky -- procedural, sun low on the horizon so the ocean reads
# as a golden-hour seascape. r_sky_use_astronomical 0 keeps the render
# independent of engine datetime / lat-lon.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 4
r_sun_azimuth 20

# No clouds / volumetrics -- keep the scene about the water surface.
r_clouds 0
r_volumetric 0

# Path tracer. A few refract bounces so the sun glints + sky reflection
# off the choppy surface resolve; firefly clamp tames the bright
# specular sparkle on the wave crests.
r_spp 2
r_max_bounces 5
r_firefly_clamp 8
r_caustics 1
r_refract_bounces 4
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.08

# Disable the HDRI env-map so the captured pixels come purely from the
# procedural sunset sun + sky (the default sunset.hdr would wash the
# tinting we are showcasing).
r_env_map ""
r_env_intensity 0.6
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# Water BRDF tuning (Phase 1 cvars still drive Fresnel / absorption /
# ior on the FFT surface -- the ocean only replaces the wave NORMAL +
# geometry, not the optical model). Deep blue-green open-ocean
# absorption.
r_water_absorption_r 0.40
r_water_absorption_g 0.10
r_water_absorption_b 0.05
r_water_ior 1.33

# --- FFT ocean (#25) -------------------------------------------------------
# Master gate on. Wind 12 m/s (fresh breeze) along +X; 50 m tile;
# moderate choppiness so crests pinch into the characteristic ocean
# shape; foam where the Jacobian folds. 256 grid is the Tessendorf
# reference resolution. The animation warms up over the fixture's frame
# count (the solver advances by wall-clock dt each frame).
r_ocean 1
r_ocean_wind_speed 12
r_ocean_wind_dir_deg 0
r_ocean_amplitude 0.00015
r_ocean_choppiness 1.0
r_ocean_tile_size 50
r_ocean_foam_threshold 0.5
r_ocean_grid_size 256
r_ocean_march_steps 64
# --- end FFT ocean ---------------------------------------------------------

# Own the scene: disable the default CSG drilled-cube + 3-sphere seeds.
# Read once during Init() before the seed calls, so set before prims.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ocean surface -- analytic MAT_WATER plane at y=0. The FFT solver
# displaces it into waves. The colour field is ignored for water (the
# BRDF uses water_params0 absorption) -- neutral 1,1,1.
prim_plane 1 0 1 0 0 water 1.0 1.0 1.0
