#
# Mesh motion blur fixture (wave-7 #21). Exercises the
# mesh_motion_params shift path in PathTrace.slang -- the rigid mesh
# translates across the shutter window so the rendered result is a
# stochastically streaked CSG mesh, mirroring the analytic-prim
# streaks PR #85 shipped.
#
# Important parser rule: the demont console splits scripts on both
# newline AND semicolon. Comment lines stay plain-ASCII without
# semicolons / backticks; same caveat as cornell_csg.cfg.
#
# What this fixture pins:
#   * Render resolution 512x384 -- modest so the committed golden
#     stays small in tree.
#   * Camera pose / FOV -- matches cornell_csg.cfg (same view onto
#     the CSG mesh + ground plane).
#   * Sun + sky -- procedural noon at fixed elevation / azimuth.
#   * Path tracer -- low spp, no denoiser, no bloom, no lens flare.
#   * r_motion_blur 1 + r_shutter_speed 0.0167 -- the headline
#     knobs the shader's stochastic shutter-time sampler reads.
#   * mesh_step 0.033 0 0 -- one canonical frame of translation at
#     2 m/s × 1/60 s = 0.033 m in +X. snapshotting prev != curr is
#     the necessary precondition for mesh_motion_params.w to fire.
#
# Mesh under test: the default CSG seed (box at origin with a
# subtracted sphere from `Engine::SeedDefaultCsgScene()`).
# pt_smoke_skip_csg_seed is NOT set so the standard mesh is built.
#
# Acceptance: the rendered PNG shows a streaked CSG mesh whose
# silhouette spans the prev-frame and curr-frame extents (a
# diagonal smear in screen-space along the camera's +X axis). The
# diff tolerances below are widened (vs cornell_csg) because each
# pixel is a stochastic average over the shutter window -- per-ray
# variance is higher than the static-scene case.

# Render extent. 512 * 384 = 196608 pixels, same as cornell_csg.
app_window_width 512
app_window_height 384

# Camera lock. Looking from (0, 1.5, 4) toward the CSG mesh + ground
# plane at the origin -- shares the cornell_csg pose so a visual
# diff vs cornell_csg.png immediately shows the streak.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch -11.5
cam_fov 60

# Sun + sky. Procedural noon, astronomy off (same as cornell_csg).
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# Path tracer. Low spp + 4 bounces matches cornell_csg.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

# Accumulator. EMA off so the captured value is the running mean
# across all rendered frames. Frame index is pinned by r_capture_seed.
r_accum_ema_alpha 0

# Denoiser knobs match cornell_csg (the harness sets r_denoiser
# itself based on the cell). r_hdr_pipeline keeps the linear HDR
# accumulator path consistent across cells.
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (same as cornell_csg). Auto-exposure adds frame-
# count dependency that would amplify noise across runs.
r_auto_exposure 0
r_exposure 0.05

# Bloom / lens flare off -- out of scope for the path-tracer matrix.
r_bloom 0
r_lens_flare 0

# Output format png because imgdiff consumes png.
r_capture_format png

# Pins the path-tracer PRNG state. Per-ray shutter-time samples are
# drawn from this seed, so the resulting blurred mesh silhouette is
# deterministic frame-to-frame.
r_capture_seed 1

# Motion blur master gates. r_motion_blur 1 turns on the shader's
# stochastic shutter-time sampling; r_shutter_speed 0.0167 = 1/60 s
# is the canonical cinema reference (180-deg shutter at 30 fps or
# 360-deg shutter at 60 fps). The actual streak length is the
# per-frame prev->curr displacement -- shutter_speed is informational
# only on the lerp side, see motion_blur_params docstring in
# PathTrace.slang.
r_motion_blur 1
r_shutter_speed 0.0167

# The `mesh_step` console command isn't reachable from a smoke-exec
# script because that exec runs BEFORE Engine::RegisterCsgCommands
# (where mesh_step is registered) and before SeedDefaultCsgScene
# (which kicks off the bake). Defer the mesh translation to a
# late-exec fixture that runs after Init completes. Same pattern
# phys_rb_smoke.cfg uses for phys_drop_* commands -- see the
# pt_smoke_late_exec docstring in src/engine/Engine.cpp.
#
# Note: the test harness in tests/CMakeLists.txt explicitly re-sets
# this cvar to the absolute path AFTER the fixture body (see the
# motion_blur_mesh cell EXTRA arg) because golden cells run in
# per-cell workdirs where this relative path doesn't resolve. The
# absolute value wins the last-writer race before Init's end-of-Init
# late-exec reader fires.
pt_smoke_late_exec tests/goldens/scenes/motion_blur_mesh_late.cfg
