# Wave 9 advanced materials -- subsurface scattering (skin / wax / marble)
# acceptance scene. A translucent WAX sphere is BACKLIT by a low sun: light
# enters the far side of the body, random-walks through the medium losing
# energy to the per-channel single-scatter albedo, and exits toward the
# camera -- so the thin rim glows warm while the thick centre stays dim,
# the unmistakable translucency of wax / marble / skin. Exercises:
#   * the bounded random-walk SSS (free-flight by scattering coefficient +
#     Henyey-Greenstein phase + per-channel single-scatter albedo),
#   * real metric mean-free-path (wax ~8 mm here),
#   * the push-constant material-override path (prim_set_subsurface).
#
# Acceptance bar: the backlit rim of the sphere glows warm (light
# transmitted through the thin edge) and the body reads as translucent, not
# an opaque matte ball. With radius 0 (SSS off) the same sphere would be a
# flat Lambert sphere with a dark unlit silhouette against the bright sky.
#
# Parser caveats match cornell_csg.cfg / spectral_prism.cfg -- NO
# semicolons or backticks anywhere (even in comments): the console splits
# scripts on both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back + level so the sphere is framed against the
# bright sky behind it -- the backlit rim glow reads against that sky.
cam_pos 0 1.0 4
cam_yaw 0
cam_pitch -6
cam_fov 55

# Sun and sky. Procedural sky (no astronomy dependence). The sun sits on
# the FAR side of the sphere from the camera (azimuth 0 == looking-away
# direction) and at roughly the sphere's screen height, so its light passes
# THROUGH the wax toward the viewer -- the backlight that makes SSS read as
# a glowing translucent body. r_sky_use_astronomical 0 decouples from
# datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 18
r_sun_azimuth 0
# Cinematic sun-size bump so the transmitted backlight is a broad warm
# wash through the rim rather than a single hot speck (radiance unchanged).
r_sun_size 6

# Path tracer. spp 1 keeps CI quick; the golden harness accumulates 64
# frames so the random-walk SSS noise settles. A few bounces let the
# transmitted light + sky ambient build up.
r_spp 1
r_max_bounces 6
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 6

# Accumulator. EMA off so the captured value is the running mean over the
# accumulated frames. r_capture_seed pins the PRNG so two runs / hosts
# converge to the same pixels modulo the noise floor imgdiff absorbs. The
# random walk is a higher-variance estimator, so the accumulation matters.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence). A touch
# brighter so the transmitted rim glow is clearly visible after ACES.
r_auto_exposure 0
r_exposure 0.08

# Post effects off -- out of scope for the path-tracer-correctness matrix
# and bloom would bleed the rim glow.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds so
# the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, mid grey). Plane equation n . p + d = 0 with
# n = +y, d = 0 puts it at y = 0.
prim_plane 1 0 1 0 0 lambert 0.40 0.40 0.40

# Wax sphere. lambert base (the random walk shades it, not the BSDF, so the
# base albedo is unused -- a neutral value is fine). radius 0.6, centred at
# y=0.9 so it floats just above the ground, framed against the sky. A
# smaller body keeps the optical thickness modest so backlight transmits.
prim_sphere 10 0 0.9 0 0.6 lambert 0.9 0.9 0.9

# Subsurface scattering. radius 0.06 m = 6 cm mean free path -- chosen so
# the thin rim (a short chord through the sphere) is only a few mean free
# paths thick and transmits the backlight brightly, while the thick centre
# stays dim: that gradient IS the translucency cue. single-scatter albedo
# (0.98, 0.86, 0.66) = warm wax that scatters strongly and absorbs little
# (so multiply-scattered light survives), with reds surviving deeper than
# blues. This sets MAT_EXT_SUBSURFACE on the prim and routes (radius, color)
# through PtPush's mat_overrides array.
prim_set_subsurface 10 0.06 0.98 0.86 0.66
