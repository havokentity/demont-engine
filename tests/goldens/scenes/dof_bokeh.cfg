# Wave 8 thin-lens depth of field (#27) acceptance scene. A row of
# emissive spheres recedes from the camera down the -Z axis; only the
# middle sphere sits on the focus plane, so it renders sharp while the
# nearer and farther spheres blur into soft bokeh discs. The blur grows
# with distance from the focus plane, exactly as a real lens defocuses.
#
# Acceptance bar from the issue: "row of spheres receding from camera,
# only middle in focus, bokeh on the rest." Emissive spheres are used
# (rather than lit diffuse ones) because bright point-like sources are
# what makes the bokeh disc shape unmistakable when out of focus -- the
# classic photographic bokeh demonstration.
#
# Photographic camera: an 85mm portrait lens at f/2.0 gives a shallow
# depth of field with a clearly visible (but not frame-swamping) blur.
# The host derives the world-space lens radius from these as
# (focal_length / fstop) / 2 / 1000 = (85 / 2.0) / 2 / 1000 =
# 0.02125 m (1 world unit = 1 metre), so the off-plane spheres defocus
# into clear bokeh discs while the focused sphere stays needle-sharp --
# both readable in a committed 512x384 golden.
#
# Parser caveats match the other fixtures -- no semicolons or backticks
# anywhere (even inside comments) because the console splits scripts on
# both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. At (-4.0, 2.4, 7), elevated and to the left, yawed +18
# degrees so it looks down the diagonal of the receding row (toward +X
# / -Z) and pitched down so the row marches into the centre of the
# frame. The spheres step in +X as they step back in -Z so each stays
# visible (no view-axis stacking / occlusion). Their camera distances
# run ~3.2 m (nearest) to ~13.7 m (farthest); the middle sphere is
# ~7 m away -- the focus distance set below.
cam_pos -4.0 2.4 7
cam_yaw 18
cam_pitch -12
cam_fov 55

# Sky and sun. Procedural sky, sun fairly low so the emissive spheres
# (not the sun) dominate and the out-of-focus bokeh discs stand out
# against a calm gradient. r_sky_use_astronomical 0 decouples the
# render from the engine datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 25
r_sun_azimuth 200

# Depth of field ON -- the feature under test. 85mm portrait lens at
# f/2.0 for a shallow depth of field. Focus distance 7.23 m puts the
# middle sphere (~7.2 m from the camera) in sharp focus; the nearer
# spheres (~3.2 m, ~5.1 m) and farther spheres (~9.4 m, ~11.6 m,
# ~13.8 m) fall off the focus plane and blur into bokeh. Round aperture
# (0 blades) so the bokeh discs are circular. With r_dof 0 this whole
# scene would be a pinhole render with every sphere sharp.
r_dof 1
r_dof_fstop 2.0
r_dof_focal_length_mm 85
r_dof_focus_distance_m 7.23
r_dof_blades 0

# Path tracer. Higher spp than the other fixtures because thin-lens DOF
# integrates over the aperture disc -- every sample lands on a different
# point of the lens, so the bokeh regions need more samples per frame to
# settle. The golden harness still accumulates many frames on top. Two
# bounces are plenty (emissive spheres + Lambert ground, no glass).
r_spp 8
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0

# Accumulator. EMA off so the captured value is the running mean over
# the accumulated frames. r_capture_seed pins the PRNG so two runs (or
# two hosts) converge modulo the noise floor the imgdiff tolerance
# absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence). Low
# so the emissive spheres read as bright bokeh discs without clipping
# the whole frame to white.
r_auto_exposure 0
r_exposure 0.03

# Post effects off -- bloom in particular would fight the bokeh discs
# for the "soft bright blob" look and is out of scope for the
# path-tracer-correctness matrix.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, mid grey) for the spheres to rest above and
# to catch a little of their emission.
prim_plane 1 0 1 0 0 lambert 0.45 0.45 0.45

# The receding row -- six emissive spheres, radius 0.4 m, centred at
# y = 0.4 so they float just above the ground. They step in +X as they
# step back in -Z, forming a diagonal line into the distance so each
# stays visible (no view-axis stacking / occlusion). Camera distances
# (camera at -4.0, 2.4, 7) run ~3.2 m (nearest) to ~13.8 m (farthest).
# Each gets a distinct emission colour so the bokeh discs are easy to
# tell apart. prim_set_emission turns each Lambert sphere into a bright
# self-luminous source whose out-of-focus image is a soft coloured disc.
#
# Middle sphere (id 12, ~7.23 m away) sits on the focus plane and stays
# needle-sharp; the others blur progressively with their distance from
# that plane -- the nearer two defocused in front, the farther three
# defocused behind.
prim_sphere 10 -2.5 0.4  5 0.4 lambert 0 0 0
prim_set_emission 10  6.0 1.2 1.2
prim_sphere 11 -1.5 0.4  3 0.4 lambert 0 0 0
prim_set_emission 11  1.2 6.0 1.6
prim_sphere 12 -0.5 0.4  1 0.4 lambert 0 0 0
prim_set_emission 12  6.0 6.0 6.0
prim_sphere 13  0.5 0.4 -1 0.4 lambert 0 0 0
prim_set_emission 13  1.4 2.2 6.0
prim_sphere 14  1.5 0.4 -3 0.4 lambert 0 0 0
prim_set_emission 14  6.0 3.0 1.0
prim_sphere 15  2.5 0.4 -5 0.4 lambert 0 0 0
prim_set_emission 15  5.0 1.2 6.0
