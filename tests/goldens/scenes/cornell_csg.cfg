#
# Golden-image regression matrix (issue #45) -- scene fixture for
# the cornell_csg cell. Drives the engine into a fully-deterministic
# state so two runs (or two hosts) produce the same pixels modulo
# the stochastic noise floor governed by r_capture_seed.
#
# Important parser rule: the demont console splits scripts on both
# newline AND semicolon, even inside hash-prefixed comment lines.
# So a stray semicolon inside a comment leaks the post-semicolon
# text as a fresh command on the next pseudo-line. Same hazard with
# backtick characters in some contexts. To keep the fixture robust
# every comment line below sticks to plain ASCII without semicolons
# or backticks.
#
# What this fixture pins:
#   * Render resolution -- modest 512x384 so committed goldens stay
#     under ~50 KB each.
#   * Camera pose / FOV -- engineering default position.
#   * Sun + sky -- procedural noon at fixed elevation / azimuth.
#   * Spp + bounces + clamps -- low spp for fast CI.
#   * Bloom + lens flare -- disabled to take post effects out of
#     scope for the path-tracer-correctness matrix.
#   * Capture format png and capture seed non-zero for determinism.
#
# What this fixture does NOT touch:
#   * r_backend -- driven by --r-backend= via pt_render_one_frame.
#   * r_denoiser -- written by the wrapper-synthesised pre-exec.
#   * pt_smoke_frames / pt_smoke_capture_out -- wrapper-driven.

# Render extent. 512 * 384 = 196608 pixels.
app_window_width 512
app_window_height 384

# Camera lock. Looking from (0, 1.5, 4) down -Z toward the CSG mesh
# at world origin with the analytic ground plane at y=0.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch -11.5
cam_fov 60

# Sun and sky. Procedural sky avoids coupling to the sunset HDRI.
# r_sky_use_astronomical 0 disables the astronomy pipeline so the
# render doesn't depend on the engine datetime or lat/lon.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# Path tracer. Low spp keeps CI quick. Four bounces are enough for
# the dielectric sphere refraction without inflating GPU time.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

# Accumulator. EMA off so the running mean across r_spp samples and
# the smoke frame count is the value captured. r_capture_seed below
# pins frame_index so the path tracer PRNG starts in a known state.
r_accum_ema_alpha 0

# Denoiser knobs. r_denoiser itself is set by the harness wrapper
# per cell. These cvars affect the chosen denoiser if any.
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure. Auto-exposure would add frame-count dependency
# to the captured pixel values.
r_auto_exposure 0
r_exposure 1.5

# Bloom and lens flare off. Both add post-stack contributions that
# are not in scope for the path tracer matrix.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang pcgHash to a known state.
r_capture_seed 1
