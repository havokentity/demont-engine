# Ocean foam + whitecaps (Wave 9) acceptance scene. Extends the Wave 8
# FFT ocean (ocean_fft.cfg) to showcase the new foam shading: a stronger
# Beaufort-7 wind (16 m/s -- well past the ~7 m/s whitecap-onset speed)
# drives a choppy, high-amplitude sea whose breaking crests + wind-driven
# whitecaps shade as a bright, rough, near-white Lambertian froth that
# overrides the specular water surface, persisting with a decay trail
# after each crest folds.
#
# What this fixture pins (on top of ocean_fft.cfg's FFT-ocean coverage):
#   * r_ocean_foam_amount / _persistence / _coverage drive visible white
#     foam on the wave crests (the wave-8 fixture's dark sunset hides it)
#   * Higher wind => more whitecap coverage (Monahan/Wu: sharp rise above
#     ~7 m/s); 16 m/s is a near-gale with widespread breaking crests
#   * Foam is bright + rough + diffuse (air-water microbubble froth),
#     not the specular sea it replaces
#
# A daylight sun (45 deg elevation) + higher exposure than the sunset
# ocean_fft fixture so the whitecaps actually read as white in the
# captured PNG rather than being crushed to near-black.
#
# Parser caveats mirror cornell_csg.cfg -- no semicolons or backticks
# anywhere in this file, even inside comments.

# Render extent matches the other golden fixtures.
app_window_width 512
app_window_height 384

# Camera lock. Low over the water (y = 3 m) looking out toward the
# horizon with a shallow downward pitch so the displaced ocean fills the
# lower half of the frame and the camera grazes the wave crests -- the
# angle that best shows whitecaps riding the swell. 3 m eye height still
# clears the tallest crests so the surface reads as a continuous sea.
cam_pos 0 3.0 0
cam_yaw 0
cam_pitch -8
cam_fov 60

# Daylight sky -- procedural, sun high enough to light the foam white.
# r_sky_use_astronomical 0 keeps the render independent of engine
# datetime / lat-lon.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# No clouds / volumetrics -- keep the scene about the water surface.
r_clouds 0
r_volumetric 0

# Path tracer. A few refract bounces so the sun glints + sky reflection
# off the choppy surface resolve; firefly clamp tames the bright
# specular sparkle on the wave crests.
r_spp 2
r_max_bounces 5
r_firefly_clamp 8
r_caustics 1
r_refract_bounces 4
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.5

# Disable the HDRI env-map so the captured pixels come purely from the
# procedural daylight sun + sky.
r_env_map ""
r_env_intensity 0.6
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# Water BRDF tuning (Phase 1 cvars still drive Fresnel / absorption /
# ior on the FFT surface). Deep blue-green open-ocean absorption so the
# white foam contrasts crisply against the dark sea.
r_water_absorption_r 0.40
r_water_absorption_g 0.10
r_water_absorption_b 0.05
r_water_ior 1.33

# --- FFT ocean + foam (Wave 9) ---------------------------------------------
# Master gate on. Wind 16 m/s (Beaufort 7, near gale) along +X -- well
# past the ~7 m/s whitecap onset, so the wind-coverage term lifts foam
# onto most crests. Larger amplitude than the wave-8 fixture for taller,
# clearly-breaking swells. Strong choppiness so the displacement folds
# (Jacobian foam) on the crest fronts. 256 grid is the Tessendorf
# reference resolution.
r_ocean 1
r_ocean_wind_speed 16
r_ocean_wind_dir_deg 0
r_ocean_amplitude 0.0004
r_ocean_choppiness 1.0
r_ocean_tile_size 50
r_ocean_foam_threshold 0.5
r_ocean_grid_size 256
r_ocean_march_steps 64
# Wave 9 foam dials: full intensity, a multi-second persistence trail,
# and the reference whitecap-coverage ramp tied to wind speed.
r_ocean_foam_amount 1.2
r_ocean_foam_persistence 0.92
r_ocean_foam_coverage 1.0
# --- end FFT ocean + foam --------------------------------------------------

# Own the scene: disable the default CSG drilled-cube + 3-sphere seeds.
# Read once during Init() before the seed calls, so set before prims.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ocean surface -- analytic MAT_WATER plane at y=0. The FFT solver
# displaces it into waves. The colour field is ignored for water (the
# BRDF uses water_params0 absorption) -- neutral 1,1,1.
prim_plane 1 0 1 0 0 water 1.0 1.0 1.0
