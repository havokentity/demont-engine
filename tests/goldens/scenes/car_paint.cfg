# Wave 9 advanced materials -- clearcoat (car paint / lacquer) acceptance
# scene. A deep-red pigment sphere wears the MAT_EXT_CLEARCOAT lobe: a
# clear lacquer coat (IOR 1.5) layered over the base diffuse pigment that
# reflects the sun + sky INDEPENDENTLY of the base colour. The result is
# the classic automotive look -- a crisp white gloss highlight floating on
# top of the saturated red body. Exercises:
#   * the layered coat-over-base stochastic lobe selection (Fresnel-
#     weighted), energy-conserving across the coat / base split,
#   * an isotropic GGX gloss lobe at low coat roughness,
#   * the push-constant material-override path (prim_set_clearcoat).
#
# Acceptance bar: a sharp specular gloss highlight (the coat reflecting the
# sun) sits on the red sphere, distinct from the matte red of the bare
# pigment lower down. Without the coat (weight 0) the sphere would be a
# flat-red Lambert ball with no gloss.
#
# Parser caveats match cornell_csg.cfg / spectral_prism.cfg -- NO
# semicolons or backticks anywhere (even in comments): the console splits
# scripts on both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back + pitched down to frame the painted sphere on
# the ground plane with the coat highlight on its upper hemisphere.
cam_pos 0 1.4 4
cam_yaw 0
cam_pitch -12
cam_fov 55

# Sun and sky. Procedural sky (no astronomy dependence). The sun is placed
# high so its reflection in the clear coat lands as a bright gloss spot on
# the sphere's upper face. r_sky_use_astronomical 0 decouples from datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 50
r_sun_azimuth 10
# Cinematic sun-size bump so the coat's gloss highlight reads as a clear
# disc at this resolution rather than a single-pixel speck (radiance is
# unchanged -- only the apparent disc radius scales).
r_sun_size 5

# Path tracer. spp 1 keeps CI quick; the golden harness accumulates 64
# frames so the stochastic coat / base lobe selection settles. A few
# bounces let the red pigment pick up sky + bounce light.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

# Accumulator. EMA off so the captured value is the running mean over the
# accumulated frames. r_capture_seed pins the PRNG so two runs / hosts
# converge to the same pixels modulo the noise floor imgdiff absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence).
r_auto_exposure 0
r_exposure 0.06

# Post effects off -- out of scope for the path-tracer-correctness matrix
# and bloom would bleed the gloss highlight.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds so
# the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, mid grey). Plane equation n . p + d = 0 with
# n = +y, d = 0 puts it at y = 0.
prim_plane 1 0 1 0 0 lambert 0.45 0.45 0.45

# Car-paint sphere. lambert base = deep saturated red pigment (this is the
# body colour the eye reads through the clear coat). radius 0.8, centred at
# y=0.8 so it rests on the ground.
prim_sphere 10 0 0.8 0 0.8 lambert 0.55 0.04 0.05

# Clearcoat lobe. weight 0.9 = a strong clear lacquer; roughness 0.04 keeps
# the gloss highlight crisp (automotive lacquer is near-mirror). This sets
# MAT_EXT_CLEARCOAT on the prim and routes (weight, roughness) through
# PtPush's mat_overrides array (prim storage stride untouched). The coat
# reflects the sun + sky on top of the red body for the painted look.
prim_set_clearcoat 10 0.9 0.04
