#
# Aurora OFF smoke fixture (issue #116). Same scene as
# aurora_smoke.cfg but with r_aurora 0 so we can verify the
# dispatch is elided (no aurora pixels) -- the engine gate
# (`aurora_active` in Engine.cpp use_engine_tonemap branch) must
# collapse to false so the BindComputePipeline + Dispatch path is
# entirely skipped, not just early-out-in-shader.

app_window_width 1024
app_window_height 768

cam_pos 0 1.5 0
cam_yaw 0
cam_pitch 25
cam_fov 70

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -10
r_sun_azimuth 180

r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4

r_accum_ema_alpha 0
r_capture_seed 1

r_denoiser svgf_atrous
r_svgf_atrous_passes 1
r_hdr_pipeline 1

r_auto_exposure 0
r_exposure 0.05

# Aurora OFF -- the only knob that changes vs aurora_smoke.cfg.
r_aurora 0

r_star_split 1
r_show_stars 1

r_bloom 0
r_lens_flare 0

r_capture_format png
