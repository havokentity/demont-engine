# Golden-image regression matrix (issue #112) -- civil-twilight scene.
# Sun at -2 degrees (just below horizon). Exercises:
#   * Sun-below-horizon math (no visible sun disc, but sky still lit)
#   * Civil-twilight horizon glow
#   * Sky-without-sun-disc branch in PathTrace.slang
#   * Exposure on a dim but non-zero sky
#
# Parser caveat: console splits on newline and semicolon even inside
# comments. ASCII only, no semicolons or backticks.

app_window_width 512
app_window_height 384

# Camera looks east-ish at horizon. Sun azimuth 90 = east -- yaw 90
# points the camera in that direction. Pitch slightly up.
cam_pos 0 1.5 4
cam_yaw 90
cam_pitch 8
cam_fov 60

# Sky: manual procedural. Sun at -2 deg = "civil dawn" -- sun just
# below the horizon, sky still has horizon glow but no sun disc.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -2
r_sun_azimuth 90

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure, brighter than evening since the scene is dimmer.
r_auto_exposure 0
r_exposure 1.5

# Bloom still on (sky horizon glow has its own dim HDR signature).
r_bloom 1
r_lens_flare 0

# Stars off (civil twilight is too bright for stars to be visible
# even with BSC catalog enabled).
r_stars_aperture_samples 16
r_star_split 0
r_dof 0
r_clouds 0

r_capture_format png
r_capture_seed 1
