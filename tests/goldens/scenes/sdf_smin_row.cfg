# SDF Phase 1 (#97) acceptance scene. Renders three smooth-min-blended
# sphere pairs next to three plain analytic spheres + ground plane so
# the same frame contains both representations under one path-tracer.
#
# Acceptance bar from the issue:
#   "A row of smin-blended sphere pairs next to existing analytic
#    spheres in the same frame, all shaded identically under PT.
#    Blend region shows continuous normal (no facet artifact)."
#
# Parser caveats are the same as cornell_csg.cfg -- no semicolons or
# backticks anywhere in this file, even inside comments, because the
# console splits on those characters before stripping comments.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back far enough to frame the entire row of six
# objects across the X axis. Camera at +Z=8 looking at -Z (the engine
# default), pitched down so the y=0.5 row is centred.
cam_pos 0 1.5 8
cam_yaw 0
cam_pitch -6
cam_fov 55

# Sky -- bundled CC0 sunset HDRI. SDF marches make every primary
# miss escape to sky, and procedural sky's curved-Earth atmospheric
# transmittance (#51) costs ~10x per sample vs a single HDRI fetch.
# HDRI keeps interactive iteration on this fixture fast enough to be
# usable -- procedural sky is exercised by the procedural_*.cfg
# cells instead. r_sky_use_astronomical / r_sun_* are left in for
# cfg-round-trip stability but are inert in hdri mode.
r_sky_mode hdri
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

# Path tracer. Low spp keeps CI quick. The smin blend region needs a
# few bounces for indirect to settle.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.25
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# SDF iteration budget. Defaults are r_sdf_max_iters=128 and
# r_sdf_epsilon=1e-4 m. Pin them explicitly for cfg determinism.
r_sdf_max_iters 128
r_sdf_epsilon 0.0001

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture. These two cvars are
# read once during Init() before the seed calls -- they don't affect
# anything after first frame.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, light grey).
prim_plane 1 0 1 0 0 lambert 0.55 0.55 0.55

# Left half of the frame -- three plain analytic spheres in a row.
prim_sphere 10 -3.5 0.5  0.0 0.45 lambert    0.92 0.30 0.30
prim_sphere 11 -2.3 0.5  0.0 0.45 metal      1.00 0.85 0.45 0.05
prim_sphere 12 -1.1 0.5  0.0 0.45 dielectric 1.00 1.00 1.00 0    1.5

# Right half -- three pairs of SDF spheres, each pair fused via
# sdf_smin at progressively larger smoothing radii. r=0.4 spheres,
# centres ~0.55 m apart so each pair touches at k=0 and bulges
# visibly at k=0.20. sdf_smin consumes its two child clusters into
# the merged op-tree, so the leaves are re-issued under fresh ids
# for each pair.

# Pair A k=0.05 -- tight blend, near-tangent
sdf_sphere 100 0.4 0.35 0.5 0.0 lambert 0.30 0.65 0.95
sdf_sphere 101 0.4 0.85 0.5 0.0 lambert 0.30 0.65 0.95
sdf_smin   200 100 101 0.05 lambert 0.30 0.65 0.95

# Pair B k=0.12 -- moderate blend, visible bridge
sdf_sphere 110 0.4 1.65 0.5 0.0 lambert 0.95 0.55 0.20
sdf_sphere 111 0.4 2.15 0.5 0.0 lambert 0.95 0.55 0.20
sdf_smin   210 110 111 0.12 lambert 0.95 0.55 0.20

# Pair C k=0.20 -- heavy blend, peanut shape
sdf_sphere 120 0.4 2.95 0.5 0.0 lambert 0.55 0.85 0.45
sdf_sphere 121 0.4 3.45 0.5 0.0 lambert 0.55 0.85 0.45
sdf_smin   220 120 121 0.20 lambert 0.55 0.85 0.45
