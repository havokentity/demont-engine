# Golden-image regression matrix (issue #112) -- moonlit night scene.
# Astronomical mode pinned to deep night (sun well below horizon, see
# date+hour below) -- camera framed on the computed moon position so the
# disc dominates. Exercises:
#   * Astronomy Moon API end-to-end (#65 unit-test side -- this is the
#     render-side verification)
#   * moonPhaseAngle and moonDistanceKm scale via r_moon_size
#   * Moon disc rendering + ACES tonemap on moon brightness
#   * Moon halo + atmospheric attenuation at the rendered altitude
#
# Scope limit: the camera is pitched well above the horizon (see
# cam_pitch below) to centre the moon, so the ground plane and any
# scene-below geometry are out of frame. Moon-NEE-onto-scene-geometry
# coverage (cloud lighting from moon) lives in bsc_night_clouds.cfg
# where clouds occupy the upper-sky frustum.
#
# Parser caveat: ASCII only, no semicolons or backticks in comments.

app_window_width 512
app_window_height 384

# Camera aimed directly at the computed moon position so the disc
# dominates the frame. Engine yaw convention: 0 = north (-Z),
# 90 = east (+X), matching the astronomy azimuth (0=N, 90=E). Pitch
# is altitude (0 = horizon, +90 = zenith). For the pinned date below
# the moon lands at az ~294.6 deg, alt ~49.3 deg (Meeus moonPosition()
# + equatorialToHorizon() at Chennai 13.0827N 80.2707E). cam_yaw and
# cam_pitch below match that pose so the moon disc + composite path
# is actually exercised by the captured golden.
cam_pos 0 1.5 4
cam_yaw 294.6
cam_pitch 49.3
cam_fov 60

# Sky: astronomical (so moon position comes from real ephemeris math,
# not a manual cvar). Pin date + hour so the moon position is
# deterministic across hosts and runs.
#
# 2026-01-03 22:00 UTC at Chennai (default lat/lon) places the moon
# well above the horizon -- the cam_yaw/cam_pitch above are matched
# to the engine's Meeus-series result for this date. If the date here
# is changed, re-run the computation and adjust the camera pose.
r_sky_mode procedural
r_sky_use_astronomical 1
r_sky_year 2026
r_sky_month 1
r_sky_day 3
r_sky_hour 22
r_sky_hour_local 0

# Stars disabled to isolate the moon contribution (BSC starmap is
# tested in its own scene above). Setting r_stars_mode to procedural
# alone does NOT disable stars -- it just switches the source. The
# engine still composites stars whenever r_show_stars=1 (default).
# r_show_stars 0 is the kill-switch for both procedural and BSC paths.
r_show_stars 0
r_stars_twinkle 0
r_star_split 0
r_stars_aperture_samples 16

# Moon. Make it large + bright so it's the visible focus of the frame.
# r_moon_size 1.0 = engine default (already 2x real for visibility) --
# we keep it at the default so the golden doesn't depend on a tuning
# knob nobody usually changes. r_moon_brightness 0.7 = engine default.
r_moon_size 1.0
r_moon_brightness 0.7

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure boosted for night. Moon is HDR-bright relative to
# the dim sky.
r_auto_exposure 0
r_exposure 0.05

r_bloom 1
r_lens_flare 0
r_dof 0
r_clouds 0

r_capture_format png
r_capture_seed 1
