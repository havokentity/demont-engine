# Golden-image regression matrix (issue #112) -- moonlit night scene.
# Sun far below horizon (-45 deg), moon visible. Exercises:
#   * Astronomy Moon API end-to-end (#65 unit-test side -- this is the
#     render-side verification)
#   * moonPhaseAngle and moonDistanceKm scale via r_moon_size
#   * Moon disc rendering + ACES tonemap on moon brightness
#   * Moon as a NEE light contribution to the scene below
#
# Parser caveat: ASCII only, no semicolons or backticks in comments.

app_window_width 512
app_window_height 384

# Camera looks up so the moon dominates the frame. Choose a date where
# the moon is full (or near-full) so disc is bright and visible.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch 25
cam_fov 60

# Sky: astronomical (so moon position comes from real ephemeris math,
# not a manual cvar). Pin date + hour so the moon position is
# deterministic across hosts and runs.
#
# 2026-01-03 22:00 UTC has the moon roughly full and above the horizon
# at Chennai (default lat/lon). Tighter calibration is fine -- the
# golden captures whatever position the engine computes -- what matters
# is that the captured position is reproducible.
r_sky_mode procedural
r_sky_use_astronomical 1
r_sky_year 2026
r_sky_month 1
r_sky_day 3
r_sky_hour 22
r_sky_hour_local 0

# Stars disabled to isolate the moon contribution (BSC starmap is
# tested in its own scene above).
r_stars_mode procedural
r_stars_twinkle 0
r_star_split 0
r_stars_aperture_samples 16

# Moon. Make it large + bright so it's the visible focus of the frame.
# r_moon_size 1.0 = engine default (already 2x real for visibility) --
# we keep it at the default so the golden doesn't depend on a tuning
# knob nobody usually changes. r_moon_brightness 0.7 = engine default.
r_moon_size 1.0
r_moon_brightness 0.7

r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure boosted for night. Moon is HDR-bright relative to
# the dim sky.
r_auto_exposure 0
r_exposure 1.5

r_bloom 1
r_lens_flare 0
r_dof 0
r_clouds 0

r_capture_format png
r_capture_seed 1
