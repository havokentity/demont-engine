#
# SIGMA sun-shadow demodulation regression scene (issue #115, B10).
#
# The point of this fixture: a procedural-sun shadow cast across a
# Lambert ground plane, with a POINT LIGHT sitting inside the sun
# umbra. Before the B10 fix, SigmaShadow.slang multiplied the ENTIRE
# post-denoise HDR by the denoised sun visibility (hdr *= vis), so any
# light other than the sun -- here the point light's warm pool, plus the
# indirect bounce fill -- was multiplied by ~0 inside the shadow and the
# umbra rendered pure black. The fix demodulates only the direct sun, so
# the shadow interior keeps the point-light + indirect illumination while
# the sun-shadow edge stays crisp under the SVGF a-trous denoiser.
#
# No fixture previously combined a sun shadow with an in-umbra light,
# which is why the bug shipped. Metal + svgf_atrous is the only cell:
# SIGMA is Metal-only and the demod path only runs with a denoiser on.
#
# Parser note (same as the other fixtures): scripts split on newline AND
# semicolon even in comments, so every comment line stays plain ASCII
# with no semicolons or backticks.

# Render extent. 512 * 384 keeps the committed golden small.
app_window_width 512
app_window_height 384

# Camera looking down at the ground so both the lit plane, the sun
# shadow, and the in-shadow point-light pool are all in frame.
cam_pos 0 4 9
cam_yaw 0
cam_pitch -22
cam_fov 55

# Procedural sky with a fixed mid sun. r_sky_use_astronomical 0 so the
# render does not depend on datetime / lat-lon. A moderate elevation
# casts a long, readable shadow instead of a tight one under the sphere.
# Azimuth 0 puts the sun in -Z (far side), so the occluder's shadow
# falls toward +Z -- straight at the camera -- landing on the point
# light. Sun direction is (cos*sin(az), sin(elev), -cos*cos(az)); see
# Engine.cpp. Elevation 27 gives a long, unambiguous shadow.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 27
r_sun_azimuth 0
r_show_stars 0
r_star_split 0

# Path tracer. A few spp + bounces so the indirect fill in the umbra is
# present (that fill is part of what the old bug blacked out).
r_spp 4
r_max_bounces 3
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0
r_accum_ema_alpha 0
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0

# SIGMA shadow demod on (default), a-trous passes pinned for determinism.
r_shadow_demod 1
r_svgf_atrous_passes 1

# Deterministic capture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Lambert ground.
prim_plane 1 0 1 0 0 lambert 0.70 0.70 0.70

# Occluder sphere sitting on the ground at z=-0.5. With elevation 27 its
# shadow reaches ~1.7/tan(27) ~= 3.3 units toward +Z, so the umbra centre
# lands near z=2.8 -- right where the point light sits.
prim_sphere 10 0 1.7 -0.5 1.7 lambert 0.55 0.55 0.58

# A second Lambert sphere off to the right in full sun as a lit control:
# its own sharp sun-shadow edge should read on the ground beside it, away
# from the point-light pool.
prim_sphere 11 3.6 1.1 0.5 1.1 lambert 0.80 0.75 0.70

# Warm point light hovering just over the ground, inside the sun umbra
# cast toward the camera. Its bright pool -- plus the indirect fill
# around it -- is exactly what the old hdr *= vis multiply blacked out.
light_point 1 0 0.45 3.3 150 70 30

# Output.
r_capture_format png
r_capture_seed 1
