# High-altitude sunset fixture for issue #51 (curved-Earth atmospheric
# scattering). Renders a 10 km airliner-altitude camera pointed at a
# low sun -- this is where the spherical-Earth horizon-dip becomes
# visible (~3.2 deg dip below mathematical horizon).
#
# Parser-safety: no semicolons or backticks anywhere in this file
# (including comments). The engine console splits scripts on both
# newline AND semicolon, even inside hash-prefixed comment lines.

# Modest extent.
app_window_width 640
app_window_height 360

# Camera at 10000 m above ground -- typical airliner altitude. y=10000
# in our 1 unit = 1 metre convention.
cam_pos 0 10000 0
cam_yaw -90
cam_pitch 0
cam_fov 50

# Procedural sky, sun at 2 deg above horizon (true mathematical
# horizon). The visible horizon from altitude dips ~3.2 deg below
# mathematical horizon, so the sun is visually "above" the visible
# horizon by ~5.2 deg.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 2
r_sun_azimuth 90

# Atmospheric scattering enabled.
r_volumetric 1
r_volumetric_density 0.002
r_volumetric_anisotropy 0.7
r_volumetric_intensity 1.0
r_volumetric_samples 16
r_rayleigh 30

# Clouds off.
r_clouds 0

# Path tracer settings.
r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0

# Accumulator off.
r_accum_ema_alpha 0

# Manual exposure 1.5.
r_auto_exposure 0
r_exposure 0.05

# Post effects off.
r_bloom 0
r_lens_flare 0

# Denoiser off.
r_denoiser off

# Capture deterministically.
r_capture_format png
r_capture_seed 1
