# Golden-image regression matrix (issue #112) -- daytime-sky scene.
# Sun high at 60 degrees elevation, azimuth 135 (SE). Camera frames
# the daytime sky to the north (yaw 0) -- the sun disc sits well
# outside the FOV by design, so this cell tests the diffuse upper-sky
# regime rather than the disc itself. Exercises:
#   * Procedural sky daytime branch
#   * Atmospheric scatter Rayleigh-blue at high sun elevation
#   * Indirect sky illumination and noise floor at 1 spp
#   * Tonemap on bright daytime HDR sky (no clipping)
#
# Dedicated sun-disc + HDR-tonemap coverage lives in
# procedural_evening.cfg, where the camera is aimed at the sun.
#
# Parser caveat (same as cornell_csg.cfg): the console splits on both
# newline and semicolon, even inside comments. Keep comment text ASCII
# without semicolons or backticks so the parser doesn't leak script
# commands out of comment lines.

# Render extent matches the other golden fixtures (512x384) so the
# imgdiff tolerances stay calibrated on the same pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pitched up slightly so the upper sky dominates the frame
# (where the daytime atmospheric Rayleigh-blue and sun disc live).
# Ground plane below for occlusion grounding.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch 20
cam_fov 60

# Sky: manual procedural (no astronomical clock dependency on host time).
# Sun at 60-deg elevation = "noon" approximation. Azimuth 135 = SE.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 60
r_sun_azimuth 135

# Path tracer. Low spp + low bounces -- daytime sky dominates fewer
# bounce paths so 1-spp suffices for a deterministic noise floor.
r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure. Auto-exposure would couple pixel values to the
# frame-history accumulator across the smoke-frame budget.
r_auto_exposure 0
r_exposure 0.05

# Bloom on for daytime (sun disc is HDR-bright), lens flare off
# (post-stack feature, not in the path-tracer correctness matrix).
r_bloom 1
r_lens_flare 0

# Star / moon disabled for noon: irrelevant during day, and stars are
# explicitly tested in bsc_night below.
r_stars_aperture_samples 16
r_star_split 0
r_dof 0
r_clouds 0

# Output. PNG required by imgdiff. Capture seed pins the PathTrace.slang
# PRNG so two runs on the same host produce identical pixels.
r_capture_format png
r_capture_seed 1
