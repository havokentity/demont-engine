# Physics Phase 2a (#138) late-exec fixture. Runs AFTER:
#   * SeedDefaultPrimitives (ground plane at y=0 exists)
#   * All console commands registered (phys_drop_sphere /
#     phys_drop_box / phys_drop resolve)
#
# Spawns a mix of rigid spheres and rigid boxes. Boxes use the
# bounding-sphere collision shape for Phase 2a (box-box SAT is Phase
# 2b -- per issue #138 these are visually rendered as their bounding
# sphere too since shaders/* are off-limits in this PR).

# A row of rigid spheres at varying heights.
phys_drop_sphere  0.0 4.0  0.0 0.3 1.0
phys_drop_sphere  0.6 5.5 -0.3 0.3 1.0
phys_drop_sphere -0.6 7.0  0.3 0.3 1.0

# A couple of rigid boxes (sphere collision proxy for Phase 2a).
phys_drop_box  1.5 5.0  0.0 0.3 0.3 0.3 1.0
phys_drop_box -1.5 6.5  0.0 0.4 0.4 0.4 1.5
