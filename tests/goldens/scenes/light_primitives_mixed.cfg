#
# Light primitives (#73) mixed-type acceptance scene. One of each
# supported analytic light type illuminating a Lambert plane plus a
# diffuse sphere, sun below horizon so the lights are the dominant
# source.

app_window_width 512
app_window_height 384

cam_pos 0 3 7
cam_yaw 0
cam_pitch -15
cam_fov 55

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -30
r_sun_azimuth 0
r_show_stars 0
r_star_split 0

r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0
r_accum_ema_alpha 0
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0

pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

prim_plane 1 0 1 0 0 lambert 0.60 0.60 0.60
prim_sphere 10 0 1 0 1 lambert 0.85 0.85 0.85

# Each light a different type and pulled aside so its illumination
# pattern is unambiguous.
light_point  1 -3 2.5  -1   20 8  8
light_spot   2 -1 2.5  -1   0 -1 0  25 15  10 30 10
light_sphere 3  1 2.5  -1   0.3   10 10 30
light_quad   4  3 2.5  -1   0 -1 0  1 0 0  0.4 0.4  30 30 10
