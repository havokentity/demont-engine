# Phase 4 of issue 100 -- heterogeneous volumetric raymarching showcase.
# Sunset sky with a broken cumulus layer, sun low on the horizon, sun
# rays piercing the gaps between cloud puffs as visible crepuscular
# god rays. The fixture pins everything that drives the path tracer
# so two runs produce the same pixels modulo PRNG noise.
#
# Parser rule -- same as cornell_csg.cfg -- the demont console splits
# on newline AND on the standard separator character (which we omit
# from comments here), even inside hash-prefixed comment lines. Every
# comment below sticks to plain ASCII and avoids backtick or that
# separator entirely.

# Render extent. 768x432 keeps the capture small while giving the god
# rays enough horizontal resolution to read as discrete shafts rather
# than a flat smear.
app_window_width 768
app_window_height 432

# Procedural sky -- the bundled HDRI would bake its own sun and cloud
# layer and the engine sun and cloud march would double-count. The
# astronomical flag is off so manual sun cvars below are honoured.
r_sky_mode procedural
r_sky_use_astronomical 0

# Sun -- low at 8 degrees elevation for sunset look, azimuth 90 east,
# so the sun sits centred when the camera looks east. 8 degrees keeps
# atmospheric reddening present while raising the sun enough that its
# ray bundle through the cloud band actually intersects the layer
# along the camera-east march (a sun at 1-3 deg elev grazes the cloud
# top from below and never punches through the camera-facing field).
r_sun_elevation 8
r_sun_azimuth 90

# Camera -- looking east at the sunset, pitched up so the cloud layer
# (200-500m above ground) fills the upper half of the frame and the
# horizon sun is visible bottom-centre. y=80 above-ground keeps the
# camera below the cloud base so god rays cast DOWN onto the camera
# from the cloud-gap shafts overhead. cam_pitch in DEGREES per
# Engine convention (positive = look up, negative = look down).
cam_pos 0 80 0
cam_yaw 90
cam_pitch 10
cam_fov 80

# Clouds -- cumulus preset with reduced coverage so visible gaps remain
# between puffs for sun rays to thread through. 0.30 gives a broken
# cumulus look with prominent shafts. Detail bumped so the cloud
# silhouette is wispy at the edges rather than soft circular blobs.
# r_clouds_preset custom locks the individual cvars below from being
# overwritten by a preset snap. Without this, setting r_clouds_preset
# at engine init has already snapped coverage to 0.45, density to
# 0.03, etc., and any later individual assignment loses that race.
r_clouds_preset custom
r_clouds 1
r_clouds_coverage 0.65
r_clouds_base_height 250
r_clouds_top_height 800
r_clouds_density 0.15
r_clouds_freq 0.003
r_clouds_detail 0.35
r_clouds_wind_x 0
r_clouds_wind_z 0
r_clouds_seed 3

# Phase 4 cvars. Density scale 1 = neutral. Phase g 0.85 = canonical
# cumulus forward-scatter lobe -- silver lining around the sun edge.
# Multiscatter bounces 2 = the Wrenninge default giving bright diffuse
# fill in cloud cores under self-shadow.
r_vol_density_scale 1.0
r_vol_phase_g 0.85
r_vol_multiscatter_bounces 2

# Atmospheric haze on top of clouds. r_volumetric drives the Mie haze
# march that produces the diffuse warm tint near the horizon. Without
# this term the god rays still trace through cloud gaps but the air
# does not scatter the light back toward the camera, so shafts look
# cut out rather than glowing.
r_volumetric 1
r_volumetric_density 0.008
r_volumetric_anisotropy 0.80
r_volumetric_intensity 2.0
r_volumetric_samples 32
r_rayleigh 30

# Path tracer. 4 spp because per-pixel god-ray contrast is the win and
# 1 spp would leave the volumetric march stratified jitter visible as
# banding. 2 bounces -- volumetric NEE is single-scatter anyway, so
# deeper bounces do not help and would cost frame time.
r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_accum_ema_alpha 0

# Denoiser knobs -- the engine smoke harness picks the denoiser. These
# knobs only kick in if it is enabled.
r_svgf_atrous_passes 2
r_hdr_pipeline 1

# Manual exposure. Sunset is bright. 0.7 keeps the cloud tops out of
# the ACES knee so the silver-lining curvature reads cleanly.
r_auto_exposure 0
r_exposure 0.4

# Bloom and flare off -- not in volumetric-correctness scope.
r_bloom 0
r_lens_flare 0

# PNG output -- matches imgdiff and the smoke wrapper.
r_capture_format png

# Capture seed pins PathTrace.slang pcgHash deterministically.
r_capture_seed 42
