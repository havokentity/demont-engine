# Wave 8 PBR (#26) acceptance scene -- analytic sphere + ground plane
# wearing albedo + normal + roughness texture maps from the procedural
# test set under assets/textures/. Exercises:
#   * procedural UVs (sphere lat/long, plane world-XZ),
#   * the strip-atlas texture sampling path (bilinear + per-tile wrap),
#   * sRGB-decode of the albedo map vs linear normal / roughness maps,
#   * tangent-space normal-map perturbation of the shading normal.
#
# Parser caveats match cornell_csg.cfg / sdf_smin_row.cfg -- NO
# semicolons or backticks anywhere (even in comments): the console
# splits scripts on both before stripping comment text.
#
# Determinism: textures are committed PNGs (assets/textures/*.png) so a
# clean checkout reproduces the exact pixels modulo the r_capture_seed
# noise floor. The flat-color rendering path is unaffected by this
# fixture -- materials WITHOUT a texture index render bit-for-bit as
# before (the existing cornell_csg / sky / smoke / water goldens prove
# that side).

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Pulled back and pitched down to frame the textured
# sphere sitting on the textured ground plane.
cam_pos 0 1.5 4
cam_yaw 0
cam_pitch -14
cam_fov 60

# Sky. Procedural noon at a fixed sun so the render doesn't depend on
# the engine datetime / HDRI. Matches cornell_csg's sky setup.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 50
r_sun_azimuth 130

# Path tracer. Low spp keeps CI quick. A few bounces let the textured
# diffuse surfaces pick up indirect bounce light.
r_spp 1
r_max_bounces 4
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 4
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# Own the whole scene -- skip the default CSG drilled-cube and the
# default 3-sphere prim seeds so only the geometry below renders.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, white base so the albedo texture passes
# through to its sRGB-decoded colour). Plane equation n . p + d = 0
# with n = +y, d = 0 puts it at y = 0.
prim_plane 1 0 1 0 0 lambert 1.0 1.0 1.0

# Textured sphere. White Lambert base albedo + roughness 1.0 so the
# roughness map drives the value directly (the map scales the flat
# roughness). Centred at y=0.6 so it rests just above the plane.
prim_sphere 10 0 0.6 0 0.6 lambert 1.0 1.0 1.0

# Assign PBR maps. The albedo checkerboard is sRGB-encoded (decoded to
# linear in-shader); the normal + roughness maps are linear data.
prim_set_albedo_tex 10 assets/textures/checker_albedo.png
prim_set_normal_tex 10 assets/textures/normal_bumps.png
prim_set_roughness_tex 10 assets/textures/roughness_gradient.png

# Ground plane gets the checkerboard albedo + normal bumps so the
# planar UV mapping (1 tile / metre) is visible across the floor.
prim_set_albedo_tex 1 assets/textures/checker_albedo.png
prim_set_normal_tex 1 assets/textures/normal_bumps.png
