#
# Sunset / horizon-focused fixture for issue #51 (curved-Earth
# atmospheric scattering). Renders a ground-level camera pointed at a
# low sun so the difference between planar and spherical-Earth aerial
# perspective is most visible -- horizontal-ish primary rays travel
# the longest paths through atmosphere where the curvature changes
# both airmass and the effective scale-height integral.
#
# Parser-safety: same rules as cornell_csg.cfg -- no semicolons or
# backtick characters anywhere in this file (including comments).
# The engine console splits scripts on both newline AND semicolon,
# even inside hash-prefixed comment lines, so a stray semicolon would
# leak the post-semicolon text as a fresh command on the next line.

# Modest extent so the comparison capture stays small.
app_window_width 640
app_window_height 360

# Camera at "human eyes" altitude (1.7m above ground plane y=0),
# pointing straight along +X toward the horizon. Sun azimuth below
# is aligned so the sun sits at the horizon dead-ahead.
cam_pos 0 1.7 0
cam_yaw -90
cam_pitch 0
cam_fov 50

# Procedural sky, sun at the horizon. Elevation 2 degrees gives a
# pronounced sunset glow + the longest meaningful airmass that still
# has the sun above the geometric horizon (below 0 the sun disc
# clips). Azimuth +90 puts the sun straight ahead (yaw -90 in our
# +Y up / -Z forward convention -> camera fwd is +X).
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 2
r_sun_azimuth 90

# Atmospheric scattering enabled with real-ish values so the curved
# vs. flat difference shows up in both transmittance and in-scatter.
r_volumetric 1
r_volumetric_density 0.002
r_volumetric_anisotropy 0.7
r_volumetric_intensity 1.0
r_volumetric_samples 16
r_rayleigh 30

# Clouds off -- we're isolating sky + atmospheric-transmittance changes
# so the cloud march doesn't add stochastic noise to the comparison.
r_clouds 0

# Path tracer: 1 spp, low bounces (sky is the dominant signal).
r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0

# Accumulator off (online mean across smoke frames is what gets
# captured deterministically).
r_accum_ema_alpha 0

# Manual exposure -- auto-exposure would couple the capture to the
# frame count. 1.5 matches the cornell_csg fixture exposure baseline.
r_auto_exposure 0
r_exposure 1.5

# Disable post effects so the captured pixels are pure path-tracer
# radiance with engine tonemap only.
r_bloom 0
r_lens_flare 0

# Denoiser off -- this scene is mostly sky which is low-frequency
# anyway, and the denoiser would smear over the very horizon detail
# we're trying to validate.
r_denoiser off

# Capture format png + a fixed seed so two runs match modulo noise.
r_capture_format png
r_capture_seed 1
