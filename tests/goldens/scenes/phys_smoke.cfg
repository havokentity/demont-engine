# Physics Phase 1 (#132) smoke fixture. Enables the Verlet physics
# layer, spawns a tower of spheres above the ground plane, and lets
# the smoke loop run them through several frames so we can capture
# the falling motion.
#
# Used by:
#   build/mac-release/src/app/demont \
#     --smoke-frames=N \
#     --r-backend=metal \
#     --smoke-exec=tests/goldens/scenes/phys_smoke.cfg \
#     --smoke-capture-out=captures/phys_smoke_metal.png

app_window_width  640
app_window_height 480

cam_pos 0 2.5 6
cam_yaw 0
cam_pitch -15
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

r_spp 1
r_max_bounces 4
r_accum_ema_alpha 0

r_auto_exposure 0
r_exposure 0.5
r_bloom 0
r_lens_flare 0

r_capture_format png
r_capture_seed 1

# Physics on. Defaults for gravity/substeps/damping are fine.
phys_enabled 1

# Spawn the physics spheres via the late-exec hook. The early
# smoke-exec (this file) runs after RegisterCommands -- phys_drop is
# already registered at this point -- but BEFORE PhysicsSystem is
# constructed and BEFORE SeedDefaultPrimitives runs. At early-exec
# time `phys_drop` would early-out with "physics system not
# initialised", and any drop made before SeedDefaultPrimitives runs
# would race with the seed pass clobbering its own analytic prims
# list. pt_smoke_late_exec fires AFTER both, when the physics layer
# is live and the seed pass is finished.
pt_smoke_late_exec tests/goldens/scenes/phys_smoke_late.cfg
