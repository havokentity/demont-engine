# Rigid-body demo fixture (#181). This is the user-facing companion to
# phys_rb_smoke.cfg: same physics path, but the cornell_csg seed cluster
# and the analytic-primitive seed cluster are both disabled so the
# falling rigid bodies are unambiguous against a clean ground+sky frame.
#
# Acceptance bar from #181: a single-frame screenshot should make it
# obvious bodies are falling, without an A/B test against
# phys_enabled=0. The smoke fixture passed physics correctness but the
# default cornell_csg cluster visually swallowed the bodies; this
# fixture exists specifically to be the "show me the rigid bodies"
# demo.
#
# Camera + sky + exposure mirror phys_rb_smoke.cfg (r_exposure 0.05
# per commit 20aa45b -- single canonical exposure across all golden
# scenes). The late-exec spawns a tidy tower-of-spheres + row-of-
# boxes arrangement so the fall motion is legible.

app_window_width  640
app_window_height 480

cam_pos 0 2.5 6
cam_yaw 0
cam_pitch -15
cam_fov 60

r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 45
r_sun_azimuth 135

r_spp 1
r_max_bounces 4
r_accum_ema_alpha 0

r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0

r_capture_format png
r_capture_seed 1

# Clean rigid-body stage: no cornell csg cluster, no analytic prim
# seed cluster. Just the ground plane (which the engine always seeds)
# + the late-exec'd rigid bodies + procedural sky.
pt_smoke_skip_csg_seed  1
pt_smoke_skip_prim_seed 1

phys_enabled 1

pt_smoke_late_exec tests/goldens/scenes/phys_rb_demo_late.cfg
