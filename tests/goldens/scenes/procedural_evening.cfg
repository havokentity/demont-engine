# Golden-image regression matrix (issue #112) -- sunset scene.
# Sun at 5-degree elevation. Exercises:
#   * Procedural sky low-angle Rayleigh + Mie scatter ("warm-orange")
#   * Sun disc near horizon (long atmosphere path -> heavy reddening)
#   * Tonemap on extreme HDR range (sun still bright, scene low-lit)
#   * Magic-hour exposure handling
#
# Parser caveat: console splits on newline and semicolon even inside
# comments. ASCII only, no semicolons or backticks in comments.

app_window_width 512
app_window_height 384

# Camera lock. Yaw 135 to look toward the sun (sun azimuth 135), pitch
# slightly up to capture the horizon glow band.
cam_pos 0 1.5 4
cam_yaw 135
cam_pitch 5
cam_fov 60

# Sky: manual procedural. Sun at 5 deg = "evening / sunset"
# (atmospheric path length is largest near horizon, so this should
# produce orange-red sky toward the sun azimuth).
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 5
r_sun_azimuth 135

# Path tracer. Same low-spp setup as procedural_noon.
r_spp 1
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 1
r_accum_ema_alpha 0
r_svgf_atrous_passes 3
r_hdr_pipeline 1

# Manual exposure. Lower than noon because the scene is darker overall
# but the sun disc is still HDR-bright.
r_auto_exposure 0
r_exposure 0.7

# Bloom on (low sun + bloom is the canonical "sunset" look),
# lens flare off (post-stack feature, not in path-tracer matrix).
r_bloom 1
r_lens_flare 0

# Stars off: with the sun still above the horizon at +5 deg
# (golden-hour, not yet twilight -- civil twilight is sun 0 to -6 deg)
# stars are not visible to the human eye and the procedural sky path
# does not composite them.
r_stars_aperture_samples 16
r_star_split 0
r_dof 0
r_clouds 0

r_capture_format png
r_capture_seed 1
