# Light primitives (#73) smoke-test scene. Five point lights at varied
# colours / positions illuminating a Lambert ground plane plus a single
# diffuse sphere. The sun is dropped below the horizon and the sky mode
# is procedural with stars off, so the analytic lights are the dominant
# illumination source -- exactly the case naive NEE-to-lights is built
# to solve cleanly at 1 spp.

app_window_width 512
app_window_height 384

# Camera centred above the lit region, slight downward pitch so the
# floor + the sphere both stay in frame.
cam_pos 0 3 7
cam_yaw 0
cam_pitch -15
cam_fov 55

# Sky: procedural with sun pulled deep below the horizon so the
# Lambert ambient skylight term contributes near-zero. Stars off so
# the moonless night doesn't bleed in either. Composite gate off so
# the smoke run doesn't depend on the StarsComposite pipeline.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation -30
r_sun_azimuth 0
r_show_stars 0
r_star_split 0

# Path tracer. Low spp keeps the test cheap and analytic light NEE
# produces a clean direct estimate even at 1 spp.
r_spp 4
r_max_bounces 2
r_firefly_clamp 10
r_caustics 0
r_refract_bounces 0
r_accum_ema_alpha 0
r_hdr_pipeline 1
r_auto_exposure 0
r_exposure 0.05
r_bloom 0
r_lens_flare 0
r_capture_format png
r_capture_seed 1

# Skip default scene seeds -- this fixture owns the whole scene.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground (Lambert, light grey) and one Lambert white sphere so the
# shadows + falloff are unambiguous to read.
prim_plane 1 0 1 0 0 lambert 0.60 0.60 0.60
prim_sphere 10 0 1 0 1 lambert 0.85 0.85 0.85

# Five point lights with progressively warmer hues across the floor.
# Intensity in W/sr. The y=2.5 height + inverse-square law means a
# light at intensity 20 reads roughly the same brightness on the
# floor as the sun would at noon, which is the calibration point.
light_point 1 -3.5  2.5  -1   20 8  8
light_point 2 -1.7  2.5  -1   8  20 8
light_point 3  0    2.5  -1   8  8  20
light_point 4  1.7  2.5  -1   20 20 4
light_point 5  3.5  2.5  -1   20 4  20
