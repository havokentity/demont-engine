#
# Wave 8 spectral dispersion (#27) acceptance scene. A glass sphere
# prism splits the sun's light into a rainbow: each path samples one
# hero wavelength, the dielectric refracts it by its own Cauchy IOR so
# short wavelengths bend more than long ones, and the spectral radiance
# reconstructs to RGB via the CIE 1931 colour-matching functions. The
# result is chromatic fringing on the glass edges plus a dispersed
# (rainbow-tinted) caustic on the ground where refracted sun rays focus.
#
# Acceptance bar from the issue: "a glass prism / sphere splitting a
# light beam into a rainbow." A sphere (rather than a triangular prism)
# is used because the analytic-primitive path supports an explicit
# per-material IOR via prim_sphere; it refracts at both the entry and
# exit caps, giving strong wavelength-separated chromatic edges and a
# dispersive caustic that reads clearly as a rainbow.
#
# Parser caveats match cornell_csg.cfg / sdf_smin_row.cfg -- no
# semicolons or backticks anywhere (even inside comments) because the
# console splits scripts on both before stripping comment text.

# Render extent matches the other golden fixtures so the imgdiff
# tolerances stay calibrated on the same 512x384 pixel footprint.
app_window_width 512
app_window_height 384

# Camera lock. Looking from (0, 1.6, 4.5) slightly down toward the
# glass sphere at the origin (centre y=0.9) with the ground at y=0.
# The shallow downward pitch frames both the chromatic glass edges and
# the dispersed caustic pooled on the plane behind / below the sphere.
cam_pos 0 1.6 4.5
cam_yaw 0
cam_pitch -10
cam_fov 55

# Sun and sky. Procedural sky (no astronomy dependence) with a high,
# bright sun so a strong directional beam refracts through the glass.
# A high elevation keeps the sun out of frame while still driving the
# refractive caustic. r_sky_use_astronomical 0 decouples from datetime.
r_sky_mode procedural
r_sky_use_astronomical 0
r_sun_elevation 55
r_sun_azimuth 160

# Spectral dispersion ON -- this is the feature under test. Crank the
# Cauchy C above the BK7 default to dense-flint territory (~SF11) so
# the wavelength spread across [380,730] nm is unmistakable in a
# committed golden at this resolution. With r_spectral 0 the scene
# would render as ordinary achromatic glass (this cvar is the only
# thing separating dispersive from non-dispersive output).
r_spectral 1
r_spectral_cauchy_c 0.0127

# Path tracer. spp 1 keeps CI quick; the golden harness accumulates 64
# frames so the per-ray hero-wavelength noise settles. Caustics ON so
# the refractive shadow rays carry the dispersed sun energy onto the
# ground. Generous refract bounce budget for the two-surface sphere.
r_spp 1
r_max_bounces 6
r_firefly_clamp 10
r_caustics 1
r_refract_bounces 6

# Accumulator. EMA off so the captured value is the running mean over
# the accumulated frames. r_capture_seed below pins the PRNG so two
# runs (or two hosts) converge to the same pixels modulo the noise
# floor the imgdiff tolerance absorbs.
r_accum_ema_alpha 0
r_svgf_atrous_passes 1
r_hdr_pipeline 1

# Manual exposure (auto-exposure would add frame-count dependence).
# A touch brighter than cornell_csg so the dispersed caustic and the
# chromatic rim on the glass are visible after ACES.
r_auto_exposure 0
r_exposure 0.08

# Post effects off -- out of scope for the path-tracer-correctness
# matrix and they would smear the chromatic edges the cell pins.
r_bloom 0
r_lens_flare 0

# Output format must be png because imgdiff consumes png.
r_capture_format png

# Capture seed pins PathTrace.slang's pcgHash to a known state.
r_capture_seed 1

# Disable the default CSG drilled-cube and default 3-sphere prim seeds
# so the scene is fully owned by this fixture.
pt_smoke_skip_csg_seed 1
pt_smoke_skip_prim_seed 1

# Ground plane (Lambert, light grey) to catch the dispersed caustic.
prim_plane 1 0 1 0 0 lambert 0.70 0.70 0.70

# The glass prism: a clear dielectric sphere. radius 0.9 m, centred at
# (0, 0.9, 0) so it rests on the ground plane. IOR 1.62 (dense flint)
# pairs with the high Cauchy C above for a wide dispersion fan. The
# nominal IOR anchors the Cauchy curve at the d-line; the hero
# wavelength reads its own index off the curve each path.
prim_sphere 10 0 0.9 0 0.9 dielectric 1.0 1.0 1.0 0 1.62
