<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DeMonT PathTracer · console</title>
<link rel="stylesheet" href="/console.css">
</head>
<body>
<header class="bar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
      <!-- hex frame: mesh primitive -->
      <polygon points="16,2.5 27.5,9 27.5,23 16,29.5 4.5,23 4.5,9"
               fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linejoin="round"/>
      <!-- three-bounce ray path -->
      <path d="M 7.5 11 L 13 19 L 21.5 14 L 24.5 22"
            fill="none" stroke="currentColor" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- hit points -->
      <circle cx="13"   cy="19" r="1.4" fill="currentColor"/>
      <circle cx="21.5" cy="14" r="1.4" fill="currentColor"/>
    </svg>
    <em>DeMonT</em> PathTracer &nbsp;<span class="dim">· console</span>
  </div>
  <select id="theme-select" class="theme-select" title="Theme">
    <option value="hardcore">hardcore</option>
    <option value="amber">amber</option>
    <option value="synthwave">synthwave</option>
    <option value="matrix">matrix</option>
    <option value="vault">vault</option>
    <option value="sakura">sakura</option>
    <option value="mono">mono</option>
  </select>
  <div class="status" id="status">connecting&hellip;</div>
</header>
<main class="layout">
  <section class="panel" id="output-panel">
    <div class="panel-head">output</div>
    <div class="output" id="output"></div>
    <form id="input-form" autocomplete="off">
      <span class="prompt">&gt;</span>
      <input id="input" type="text" placeholder='sys_info  ·  mem_report  ·  Tab to complete' spellcheck="false" autofocus>
    </form>
  </section>
  <aside class="panel" id="side-panel">
    <div class="panel-head">cvars</div>
    <div id="cvars" class="kv-list"></div>
  </aside>
</main>
<script src="/console.js"></script>
</body>
</html>
