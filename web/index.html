<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DeMonT Engine · console</title>
<link rel="stylesheet" href="/console.css">
</head>
<body>
<header class="bar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
      <!-- hex frame: mesh primitive (theme accent colour) -->
      <polygon class="logo-frame"
               points="16,2.5 27.5,9 27.5,23 16,29.5 4.5,23 4.5,9"
               stroke-width="1.6" stroke-linejoin="round"/>
      <!-- three-bounce ray path (theme ray colour) -->
      <path class="logo-ray"
            d="M 7.5 11 L 13 19 L 21.5 14 L 24.5 22"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- hit points -->
      <circle class="logo-dot" cx="13"   cy="19" r="1.4"/>
      <circle class="logo-dot" cx="21.5" cy="14" r="1.4"/>
    </svg>
    <em>DeMonT</em> Engine &nbsp;<span class="dim">· console</span>
  </div>
  <select id="theme-select" class="theme-select" title="Theme">
    <option value="hardcore">hardcore</option>
    <option value="amber">amber</option>
    <option value="synthwave">synthwave</option>
    <option value="matrix">matrix</option>
    <option value="vault">vault</option>
    <option value="sakura">sakura</option>
    <option value="mono">mono</option>
  </select>
  <button id="reload-btn" class="bar-btn" title="Hard reload (busts cache so embedded UI updates show up)">&#x21bb;</button>
  <div class="status" id="status">connecting&hellip;</div>
</header>
<main class="layout">
  <section class="panel" id="output-panel">
    <div class="panel-head">output</div>
    <div class="output" id="output"></div>
    <form id="input-form" autocomplete="off">
      <span class="prompt">&gt;</span>
      <span class="input-wrap">
        <input id="input" type="text" placeholder='sys_info  ·  mem_report  ·  Tab to complete' spellcheck="false" autofocus>
        <div id="input-ghost" class="input-ghost" aria-hidden="true"><span class="ghost-typed"></span><span class="ghost-tail"></span><span class="ghost-annotation"></span></div>
      </span>
    </form>
  </section>
  <div id="panel-resize" class="panel-resize" title="Drag to resize"></div>
  <aside class="panel" id="side-panel" data-mode="modern">
    <div class="panel-head">
      <span>scope</span>
      <input id="side-search" type="text" placeholder="filter…" spellcheck="false" autocomplete="off">
      <button id="mode-toggle"    class="density-btn" title="Toggle classic / modern view">▦</button>
      <button id="density-toggle" class="density-btn" title="Toggle compact / comfy density">⇅</button>
    </div>
    <div class="panel-body">
      <section class="pinned-col">
        <div class="col-head">★ pinned</div>
        <div id="pinned-list" class="kv-list pinned-list"></div>
      </section>
      <div id="inner-resize" class="inner-resize" title="Drag to resize pinned column"></div>
      <section class="tabs-col">
        <nav id="side-tabs" class="side-tabs">
          <button class="side-tab active" data-tab="cvars">cvars</button>
          <button class="side-tab"        data-tab="commands">commands</button>
          <button class="side-tab"        data-tab="stats">stats</button>
        </nav>
        <div id="cvars" class="kv-list"></div>
      </section>
    </div>
  </aside>
</main>
<script src="/console.js"></script>
</body>
</html>
